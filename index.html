<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oshikatsu Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'M PLUS Rounded 1c', sans-serif; 
            touch-action: manipulation;
            transition: background-color 0.4s ease;
        }
        ::-webkit-scrollbar { display: none; }
        
        /* 🔒 枠の完全固定：中身がどれだけ長くても絶対に横幅を均等に保つ */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, minmax(0, 1fr)); 
            width: 100%;
        }

        .modal-overlay { background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); }
        .scale-active:active { transform: scale(0.96); transition: transform 0.1s; }
        .shot-mode .hide-in-shot { display: none !important; }
        
        /* 🎀 お誕生日うちわ文字：枠を無視してハミ出す＆クリックを完全に貫通させる */
        .day-cell { position: relative; overflow: visible; }
        .uchiwa-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: none; /* 下にあるセルのクリックを絶対に邪魔しない */
        }
        .uchiwa-text { 
            white-space: nowrap; 
            display: inline-block;
        }
    </style>
</head>
<body id="app-body" class="bg-sky-50 text-slate-700 antialiased pb-24">

    <header id="main-header" class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-white/50 flex justify-between items-center transition-colors duration-400">
        <h1 onclick="window.app.editTitle()" class="text-xl font-extrabold text-slate-700 flex items-center gap-1.5 opacity-90 cursor-pointer scale-active">
            📅 <span id="app-title-text"></span>
        </h1>
        
        <div class="flex gap-1.5 hide-in-shot">
            <button onclick="window.app.requestNotif()" class="w-8 h-8 bg-white/80 text-base rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">🔔</button>
            <button onclick="window.app.toggleScreenshotMode()" class="w-8 h-8 bg-white/80 text-base rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">📸</button>
            <button onclick="window.app.openSettingModal()" class="w-8 h-8 bg-white/80 text-base rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">⚙️</button>
            <button onclick="window.app.openConfigModal()" class="w-8 h-8 bg-white/80 text-base rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">🏷️</button>
            <button onclick="window.app.openOshiModal()" class="w-8 h-8 bg-white/80 text-base rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">🩵</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <div id="countdown-container"></div>

        <div class="flex items-center justify-between px-1 mb-1">
            <div id="oshi-filter-container" class="flex gap-2 overflow-x-auto flex-1 hide-in-shot pb-1"></div>
            <button onclick="window.app.openEventListModal()" class="shrink-0 bg-white text-sky-500 text-[10px] font-bold py-2 px-3 rounded-full ml-2 shadow-sm hide-in-shot border border-sky-100 scale-active">📋 一覧・編集</button>
        </div>

        <section class="bg-white/80 backdrop-blur-sm rounded-3xl p-4 shadow-sm border border-white">
            <div class="flex justify-between items-center mb-4 px-1">
                <button onclick="window.app.shiftMonth(-1)" class="text-xs text-slate-400 font-bold scale-active hide-in-shot">< Back</button>
                
                <div class="flex items-center gap-2">
                    <h2 onclick="window.app.openMonthPicker()" class="text-sm font-extrabold text-slate-600 tracking-widest cursor-pointer scale-active flex items-center gap-1 px-3 py-1 bg-white rounded-full shadow-sm">
                        <span id="calendar-title-year"></span>年 <span id="calendar-title-month"></span>月 <span class="text-[8px] text-slate-300 hide-in-shot">▼</span>
                    </h2>
                    <button onclick="window.app.jumpToToday()" class="text-[10px] bg-sky-50 text-sky-500 font-bold px-2 py-1 rounded-full scale-active hide-in-shot border border-sky-100">今日</button>
                </div>

                <button onclick="window.app.shiftMonth(1)" class="text-xs text-slate-400 font-bold scale-active hide-in-shot">Next ></button>
            </div>
            <div id="calendar-container" class="space-y-8"></div>
        </section>

        <section class="bg-white/80 backdrop-blur-sm rounded-3xl p-4 shadow-sm border border-white">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold text-slate-500">Events</h3>
            </div>
            <div id="daily-event-list" class="space-y-3"></div>
        </section>
    </main>

    <button id="fab-button" onclick="window.app.openEventModal()" class="fixed bottom-10 right-6 w-14 h-14 bg-slate-700 text-white rounded-full shadow-2xl flex items-center justify-center text-3xl font-bold z-40 scale-active hide-in-shot transition-all duration-400">
        <span class="mb-1">＋</span>
    </button>

    <div id="modal-layer" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-overlay">
        <div id="modal-content" class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl overflow-y-auto max-h-[90vh]"></div>
    </div>

    <script>
    (function() {
        const App = {
            appTitle: localStorage.getItem('oshi_title') || 'Oshikatsu',
            baseYear: 0, baseMonth: 0, selectedDateStr: '', activeOshiFilter: 'all', 
            oshis: JSON.parse(localStorage.getItem('oshi_list')) || [{ id: 'o1', name: '推し', color: '#7dd3fc', birthday: '' }],
            categories: JSON.parse(localStorage.getItem('cat_list')) || [{ id: 'c1', name: 'LIVE' }, { id: 'c2', name: 'チケット発売日' }, { id: 'c3', name: '当落発表' }],
            events: JSON.parse(localStorage.getItem('oshi_events')) || [],

            init: function() {
                const now = new Date(); this.baseYear = now.getFullYear(); this.baseMonth = now.getMonth();
                this.selectedDateStr = this.safeDateStr(now);
                document.getElementById('app-title-text').textContent = this.appTitle;
                this.sortEvents(); this.applyTheme(); this.renderFilter(); this.renderCountdowns(); this.renderCalendar();
            },

            safeDateStr: function(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; },
            parseSafeDate: function(str) { if (!str) return null; const parts = str.split('-'); return new Date(parts[0], parts[1] - 1, parts[2]); },
            sortEvents: function() {
                this.events.sort((a, b) => {
                    const aStart = this.parseSafeDate(a.startDate)?.getTime() || 0;
                    const bStart = this.parseSafeDate(b.startDate)?.getTime() || 0;
                    if (aStart !== bStart) return aStart - bStart;
                    const aEnd = this.parseSafeDate(a.endDate || a.startDate)?.getTime() || 0;
                    const bEnd = this.parseSafeDate(b.endDate || b.startDate)?.getTime() || 0;
                    return bEnd - aEnd;
                });
            },
            save: function() { this.sortEvents(); localStorage.setItem('oshi_list', JSON.stringify(this.oshis)); localStorage.setItem('cat_list', JSON.stringify(this.categories)); localStorage.setItem('oshi_events', JSON.stringify(this.events)); },

            editTitle: function() {
                const t = prompt('カレンダーの名前を入力してください', this.appTitle);
                if(t && t.trim() !== '') { this.appTitle = t.trim(); localStorage.setItem('oshi_title', this.appTitle); document.getElementById('app-title-text').textContent = this.appTitle; }
            },

            applyTheme: function() {
                let bg = '#f0f9ff'; let head = 'rgba(255, 255, 255, 0.9)'; let fab = '#334155';
                if (this.activeOshiFilter !== 'all') {
                    const o = this.oshis.find(x => String(x.id) === String(this.activeOshiFilter));
                    if (o) { bg = o.color + '1A'; head = o.color + '0D'; fab = o.color; }
                }
                document.getElementById('app-body').style.backgroundColor = bg;
                document.getElementById('main-header').style.backgroundColor = head;
                document.getElementById('fab-button').style.backgroundColor = fab;
            },

            toggleScreenshotMode: function() {
                document.body.classList.add('shot-mode');
                const t = document.createElement('div'); t.id = 'shot-toast'; t.className = 'fixed inset-0 z-[100] flex items-end justify-center pb-12 pointer-events-none';
                t.innerHTML = `<div class="bg-slate-800/80 text-white text-xs font-bold px-5 py-3 rounded-full pointer-events-auto cursor-pointer shadow-lg" onclick="window.app.exitScreenshotMode()">📸 撮影モード中 (タップで元に戻る)</div>`;
                document.body.appendChild(t);
            },
            exitScreenshotMode: function() { document.body.classList.remove('shot-mode'); const t = document.getElementById('shot-toast'); if(t) t.remove(); },

            renderFilter: function() {
                const cont = document.getElementById('oshi-filter-container');
                let html = `<button onclick="window.app.setFilter('all')" class="shrink-0 px-3 py-1.5 rounded-full text-[10px] font-bold ${this.activeOshiFilter === 'all' ? 'bg-slate-700 text-white shadow-md' : 'bg-white text-slate-400 border'}">すべて</button>`;
                this.oshis.forEach(o => {
                    const isActive = String(this.activeOshiFilter) === String(o.id);
                    html += `<button onclick="window.app.setFilter('${o.id}')" class="shrink-0 px-3 py-1.5 rounded-full text-[10px] font-bold flex items-center gap-1.5 ${isActive ? 'text-white shadow-md' : 'bg-white text-slate-400 border'}" style="${isActive ? `background-color:${o.color}` : ''}"><div class="w-2 h-2 rounded-full" style="background-color:${o.color}"></div>${o.name}</button>`;
                });
                cont.innerHTML = html;
            },
            setFilter: function(id) { this.activeOshiFilter = id; this.applyTheme(); this.renderFilter(); this.renderCountdowns(); this.renderCalendar(); },

            renderCountdowns: function() {
                const cont = document.getElementById('countdown-container'); const today = new Date(); today.setHours(0,0,0,0);
                const countdownEvs = this.events.filter(e => e.isCountdown && (this.activeOshiFilter === 'all' || String(e.oshiId) === String(this.activeOshiFilter))).sort((a,b) => this.parseSafeDate(a.startDate) - this.parseSafeDate(b.startDate));
                if(countdownEvs.length === 0) { cont.innerHTML = ''; return; }
                let html = `<div class="flex gap-2 overflow-x-auto pb-2 hide-in-shot px-1">`;
                countdownEvs.forEach(e => {
                    const d = this.parseSafeDate(e.startDate); const diffDays = Math.ceil((d - today) / (1000 * 60 * 60 * 24)); const o = this.oshis.find(x => x.id == e.oshiId);
                    if (d >= today) {
                        html += `<div class="shrink-0 bg-white/90 border shadow-sm rounded-2xl py-2.5 px-4 flex items-center gap-3 cursor-pointer" onclick="window.app.selectDate('${e.startDate}')">
                            <div class="text-[10px] font-bold text-slate-500">${e.name} まで</div>
                            <div class="text-sm font-extrabold" style="color:${o?.color || '#0ea5e9'}">${diffDays === 0 ? '本日！🎉' : `あと <span class="text-lg">${diffDays}</span> 日`}</div>
                        </div>`;
                    }
                });
                cont.innerHTML = html + `</div>`;
            },

            renderCalendar: function() {
                const cont = document.getElementById('calendar-container'); cont.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    let y = this.baseYear, m = this.baseMonth + i; if (m > 11) { m -= 12; y++; }
                    if (i === 0) { document.getElementById('calendar-title-year').textContent = y; document.getElementById('calendar-title-month').textContent = m + 1; }
                    
                    let html = `<div class="calendar-grid gap-x-1 text-[8px] text-slate-300 font-bold text-center uppercase mb-2 ${i>0 ? 'mt-8' : ''}"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>`;
                    let weeks = []; let currentWeek = []; const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
                    for (let k = 0; k < first; k++) currentWeek.push(null);
                    for (let d = 1; d <= last; d++) { currentWeek.push(d); if (currentWeek.length === 7) { weeks.push(currentWeek); currentWeek = []; } }
                    if (currentWeek.length > 0) { while (currentWeek.length < 7) currentWeek.push(null); weeks.push(currentWeek); }

                    html += `<div class="flex flex-col gap-2">`;
                    for (let w = 0; w < weeks.length; w++) {
                        const weekDays = weeks[w]; const slots = [ [], [], [], [], [], [], [] ]; let uniqueEvs = new Map();
                        for (let wd = 0; wd < 7; wd++) {
                            const d = weekDays[wd]; if (d !== null) { this.getEventsForDay(`${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`).forEach(ev => uniqueEvs.set(ev.id, ev)); }
                        }
                        const sortedEvs = Array.from(uniqueEvs.values()).sort((a, b) => {
                            const aStart = this.parseSafeDate(a.startDate).getTime(); const bStart = this.parseSafeDate(b.startDate).getTime();
                            const aEnd = this.parseSafeDate(a.endDate || a.startDate).getTime(); const bEnd = this.parseSafeDate(b.endDate || b.startDate).getTime();
                            return (bEnd - bStart) !== (aEnd - aStart) ? (bEnd - bStart) - (aEnd - aStart) : aStart - bStart;
                        });

                        let maxRow = -1;
                        sortedEvs.forEach(ev => {
                            let startWd = 0; let endWd = 6;
                            for (let wd = 0; wd < 7; wd++) { if (weekDays[wd] !== null && this.getEventsForDay(`${y}-${String(m + 1).padStart(2, '0')}-${String(weekDays[wd]).padStart(2, '0')}`).some(e => e.id === ev.id)) { startWd = wd; break; } }
                            for (let wd = 6; wd >= 0; wd--) { if (weekDays[wd] !== null && this.getEventsForDay(`${y}-${String(m + 1).padStart(2, '0')}-${String(weekDays[wd]).padStart(2, '0')}`).some(e => e.id === ev.id)) { endWd = wd; break; } }
                            let row = 0; while (true) { let free = true; for (let wd = startWd; wd <= endWd; wd++) { if (slots[wd][row]) { free = false; break; } } if (free) break; row++; }
                            if (row < 3) { if (row > maxRow) maxRow = row; for (let wd = startWd; wd <= endWd; wd++) { if (weekDays[wd] !== null && this.getEventsForDay(`${y}-${String(m + 1).padStart(2, '0')}-${String(weekDays[wd]).padStart(2, '0')}`).some(e => e.id === ev.id)) slots[wd][row] = ev; } }
                        });

                        html += `<div class="calendar-grid gap-x-1">`;
                        for (let wd = 0; wd < 7; wd++) {
                            const d = weekDays[wd];
                            if (d === null) { html += `<div></div>`; }
                            else {
                                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`; let indicators = '';
                                for (let r = 0; r <= Math.min(maxRow, 2); r++) {
                                    const e = slots[wd][r];
                                    if (!e) { indicators += `<div class="h-[10px] mb-[2px]"></div>`; }
                                    else {
                                        const o = this.oshis.find(x => x.id == e.oshiId); const color = o?.color || '#cbd5e1';
                                        const isSingle = e.startDate === (e.endDate || e.startDate);
                                        const roundLeft = ds === e.startDate || wd === 0 || isSingle;
                                        const roundRight = ds === (e.endDate || e.startDate) || wd === 6 || isSingle;

                                        // ✨ 隙間ゼロ・長さ完全統一の究極補正ロジック
                                        let shape = '';
                                        if (roundLeft && roundRight) shape = 'w-[calc(100%-4px)] mx-[2px] rounded relative z-10';
                                        else if (roundLeft && !roundRight) shape = 'w-[calc(100%+6px)] mr-[-6px] rounded-l relative z-20';
                                        else if (!roundLeft && roundRight) shape = 'w-[calc(100%+6px)] ml-[-6px] rounded-r relative z-10';
                                        else shape = 'w-[calc(100%+12px)] ml-[-6px] mr-[-6px] relative z-20';

                                        let inner = '';
                                        if (roundLeft) {
                                            const shortName = e.name.length > 6 ? e.name.slice(0, 6) + '…' : e.name;
                                            inner = `<div class="h-full w-[3px] shrink-0" style="background-color: ${color};"></div><span class="text-[5.5px] font-bold text-slate-700 ml-1 truncate leading-none pt-[0.5px] text-left flex-1">${shortName}</span>`;
                                        }
                                        indicators += `<div class="${shape} h-[10px] mb-[2px] flex justify-start items-center overflow-hidden box-border" style="background-color: ${color}33;">${inner}</div>`;
                                    }
                                }
                                
                                const bdays = this.oshis.filter(o => o.birthday && o.birthday.slice(5) === ds.slice(5) && (this.activeOshiFilter === 'all' || String(o.id) === String(this.activeOshiFilter)));
                                html += `<div class="day-cell p-1 min-h-[52px] rounded-2xl flex flex-col items-center cursor-pointer ${ds === this.selectedDateStr ? 'bg-slate-700 text-white' : 'hover:bg-white/50'}" onclick="window.app.selectDate('${ds}')">
                                         <span class="text-[11px] font-bold mb-0.5">${d}</span>
                                         <div class="uchiwa-container flex flex-col gap-0 items-center justify-center">
                                            ${bdays.map(o => `<div class="flex flex-col items-center leading-none"><span class="uchiwa-text text-[9px] font-extrabold" style="color:#334155; text-shadow: 0.5px 0.5px 0 #fff, -0.5px -0.5px 0 #fff, 1px 1px 0 ${o.color};">${o.name}</span><span class="text-[7px] font-extrabold" style="color:#334155; text-shadow: 0.5px 0.5px 0 #fff, -0.5px -0.5px 0 #fff, 1px 1px 0 ${o.color};">HBD</span></div>`).join('')}
                                         </div>
                                         <div class="w-full mt-auto flex flex-col justify-end pb-0.5 mt-1">${indicators}</div>
                                         </div>`;
                            }
                        }
                        html += `</div>`;
                    }
                    cont.innerHTML += `<div>${html}</div>`;
                }
                this.renderDailyEvents();
            },

            getEventsForDay: function(ds) {
                const cur = this.parseSafeDate(ds);
                return this.events.filter(e => {
                    if (this.activeOshiFilter !== 'all' && String(e.oshiId) !== String(this.activeOshiFilter)) return false;
                    const s = this.parseSafeDate(e.startDate); const end = this.parseSafeDate(e.endDate || e.startDate);
                    if (cur >= s && cur <= end) return true;
                    if (cur >= s) {
                        if (e.repeat === 'weekly') return s.getDay() === cur.getDay();
                        if (e.repeat === 'monthly') return s.getDate() === cur.getDate();
                    }
                    return false;
                });
            },

            renderDailyEvents: function() {
                const list = document.getElementById('daily-event-list'); const evs = this.getEventsForDay(this.selectedDateStr);
                const bdays = this.oshis.filter(o => o.birthday && o.birthday.slice(5) === this.selectedDateStr.slice(5) && (this.activeOshiFilter === 'all' || String(o.id) === String(this.activeOshiFilter)));
                document.getElementById('selected-date-title').textContent = this.selectedDateStr.replace(/-/g, '/');
                let html = '';

                bdays.forEach(o => {
                    const color = o.color || '#f472b6'; let daysText = '';
                    if(o.birthday) {
                        const bDate = this.parseSafeDate(o.birthday); const curDate = this.parseSafeDate(this.selectedDateStr);
                        if(bDate && bDate <= curDate) { daysText = `<span class="text-[10px] font-extrabold opacity-60 ml-2">(誕生から ${Math.floor(Math.abs(curDate - bDate) / (1000 * 60 * 60 * 24))} 日)</span>`; }
                    }
                    html += `<div class="p-3 rounded-2xl flex items-center shadow-sm border" style="background-color: ${color}1A; border-color: ${color}33;"><div class="font-extrabold text-slate-700 text-sm flex items-baseline">🎂 ${o.name} Birthday! ${daysText}</div></div>`;
                });

                if (evs.length > 0) {
                    html += evs.map(ev => {
                        const o = this.oshis.find(x => x.id == ev.oshiId); const c = this.categories.find(x => x.id == ev.categoryId);
                        let badge = ''; const catName = c?.name || '未分類';
                        if (catName.includes('当落') || ev.name.includes('当落')) badge = `<span class="bg-rose-100 text-rose-500 px-1.5 py-0.5 rounded text-[10px] font-extrabold">🙏 当落発表</span>`;
                        else if (catName.includes('チケット') || ev.name.includes('チケット')) badge = `<span class="bg-blue-100 text-blue-500 px-1.5 py-0.5 rounded text-[10px] font-extrabold">🎫 チケット発売日</span>`;
                        else if (catName.includes('当選') || ev.name.includes('当選')) badge = `<span class="bg-yellow-100 text-yellow-600 px-1.5 py-0.5 rounded text-[10px] font-extrabold">🎯 当選</span>`;
                        else badge = `<span class="text-[9px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">${catName}</span>`;

                        return `<div class="p-3 bg-white border border-white rounded-2xl flex items-start gap-3 shadow-sm scale-active cursor-pointer" onclick="window.app.openEventModal('${ev.id}')">
                            <div class="w-2 h-10 rounded-full shrink-0 mt-0.5" style="background-color:${o?.color || '#ddd'}"></div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start">${badge}<span class="text-[10px] text-slate-400 font-bold">${ev.startTime || ''}${ev.endTime ? ' ~ ' + ev.endTime : ''}</span></div>
                                <div class="text-sm font-extrabold truncate mt-1 text-slate-700">${ev.name}</div>
                                ${ev.memo ? `<div class="text-[10px] text-slate-500 mt-1.5 bg-slate-50 p-2 rounded-lg leading-tight whitespace-pre-wrap">${ev.memo}</div>` : ''}
                                <div class="flex justify-between items-end mt-1.5">
                                    <span class="text-[10px] font-bold text-slate-400 border border-slate-100 px-1.5 py-0.5 rounded">${o?.name || '不明'}</span>
                                    <div class="flex gap-2">
                                        ${ev.location ? `<a href="https://maps.google.com/?q=${encodeURIComponent(ev.location)}" target="_blank" onclick="event.stopPropagation();" class="text-[10px] text-sky-500 underline font-bold">📍MAP</a>` : ''}
                                        ${ev.url ? `<a href="${ev.url}" target="_blank" onclick="event.stopPropagation();" class="text-[10px] text-blue-500 underline font-bold">🔗LINK</a>` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                }
                list.innerHTML = html || (bdays.length === 0 ? '<div class="text-center text-slate-300 text-xs py-8">予定はありません</div>' : html);
            },

            showModal: function(html) { const m = document.getElementById('modal-layer'); m.classList.remove('hidden'); document.getElementById('modal-content').innerHTML = html; },
            closeModal: function() { document.getElementById('modal-layer').classList.add('hidden'); },

            openMonthPicker: function() {
                let html = `<h3 class="font-bold mb-4 text-slate-700">年月をジャンプ🚀</h3><div class="grid grid-cols-2 gap-2 mb-4">`;
                html += `<select id="jump-year" class="bg-slate-50 p-3 rounded-xl text-sm font-bold text-center">`;
                for(let y = 2020; y <= 2030; y++) html += `<option value="${y}" ${y === this.baseYear ? 'selected' : ''}>${y}年</option>`;
                html += `</select><select id="jump-month" class="bg-slate-50 p-3 rounded-xl text-sm font-bold text-center">`;
                for(let m = 0; m < 12; m++) html += `<option value="${m}" ${m === this.baseMonth ? 'selected' : ''}>${m + 1}月</option>`;
                html += `</select></div><button onclick="window.app.applyMonthJump()" class="w-full bg-slate-700 text-white font-bold py-3 rounded-2xl text-xs shadow-md">移動する</button><button onclick="window.app.closeModal()" class="w-full bg-slate-100 py-3 rounded-2xl text-xs font-bold mt-2 text-slate-500">キャンセル</button>`;
                this.showModal(html);
            },
            applyMonthJump: function() { this.baseYear = parseInt(document.getElementById('jump-year').value); this.baseMonth = parseInt(document.getElementById('jump-month').value); this.closeModal(); this.renderCalendar(); },

            openEventListModal: function() {
                let filtered = this.events; if(this.activeOshiFilter !== 'all') filtered = this.events.filter(e => String(e.oshiId) === String(this.activeOshiFilter));
                let html = `<h3 class="font-bold mb-4 text-slate-700">📋 予定一覧・編集</h3><div class="space-y-2 max-h-[60vh] overflow-y-auto pr-1">`;
                if(filtered.length === 0) html += `<p class="text-xs text-slate-400 text-center py-8">予定がありません</p>`;
                filtered.forEach(ev => {
                    const o = this.oshis.find(x => x.id == ev.oshiId);
                    html += `<div class="bg-slate-50 border p-3 rounded-xl flex justify-between items-center cursor-pointer scale-active" onclick="window.app.openEventModal('${ev.id}')">
                        <div class="flex items-center gap-3"><div class="w-1.5 h-8 rounded-full" style="background-color:${o?.color || '#ddd'}"></div><div><div class="text-[10px] text-slate-400 font-bold">${ev.startDate}</div><div class="text-xs font-extrabold text-slate-700 truncate w-40">${ev.name}</div></div></div><div class="text-[9px] text-sky-500 font-bold bg-white border px-3 py-1.5 rounded-full shadow-sm">編集 ＞</div>
                    </div>`;
                });
                this.showModal(html + `</div><button onclick="window.app.closeModal()" class="w-full bg-slate-100 py-3 rounded-2xl text-xs font-bold mt-4 text-slate-500">閉じる</button>`);
            },

            openEventModal: function(id = null) {
                const ev = this.events.find(e => String(e.id) === String(id)) || { name: '', startDate: this.selectedDateStr, endDate: '', startTime: '', endTime: '', oshiId: this.oshis[0]?.id, categoryId: this.categories[0]?.id, repeat: 'none', location: '', isCountdown: false, memo: '', url: '' };
                this.showModal(`
                    <h3 class="font-bold mb-4 text-slate-700">${id ? '予定を編集' : '予定を追加'}</h3>
                    <form id="ev-form" class="space-y-3">
                        <input type="text" id="ev-name" value="${ev.name}" placeholder="タイトル" required class="w-full bg-slate-50 p-3 rounded-xl text-sm border outline-none font-bold">
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="text-[9px] font-bold text-slate-400 ml-1">開始日</label><input type="date" id="ev-start" value="${ev.startDate}" required class="w-full bg-slate-50 p-2 rounded-xl text-xs border font-bold"></div>
                            <div><label class="text-[9px] font-bold text-slate-400 ml-1">終了日(任意)</label><input type="date" id="ev-end" value="${ev.endDate || ''}" class="w-full bg-slate-50 p-2 rounded-xl text-xs border font-bold"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="text-[9px] font-bold text-slate-400 ml-1">開始時間</label><input type="time" id="ev-stime" value="${ev.startTime}" class="w-full bg-slate-50 p-2 rounded-xl text-xs border font-bold"></div>
                            <div><label class="text-[9px] font-bold text-slate-400 ml-1">終了時間</label><input type="time" id="ev-etime" value="${ev.endTime}" class="w-full bg-slate-50 p-2 rounded-xl text-xs border font-bold"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="ev-oshi" class="bg-slate-50 p-3 rounded-xl text-xs border font-bold">${this.oshis.map(o => `<option value="${o.id}" ${o.id===ev.oshiId?'selected':''}>${o.name}</option>`).join('')}</select>
                            <select id="ev-cat" class="bg-slate-50 p-3 rounded-xl text-xs border font-bold">${this.categories.map(c => `<option value="${c.id}" ${c.id===ev.categoryId?'selected':''}>${c.name}</option>`).join('')}</select>
                        </div>
                        <label class="flex items-center gap-2 bg-slate-50 p-3 rounded-xl border cursor-pointer"><input type="checkbox" id="ev-count" ${ev.isCountdown ? 'checked' : ''} class="w-4 h-4 text-sky-400 rounded"><span class="text-xs font-bold text-slate-600">⏳ トップにカウントダウンを表示</span></label>
                        <input type="text" id="ev-loc" value="${ev.location}" placeholder="📍 場所・住所 (Map連動)" class="w-full bg-slate-50 p-3 rounded-xl text-xs border font-bold">
                        <input type="url" id="ev-url" value="${ev.url || ''}" placeholder="🔗 URL (任意)" class="w-full bg-slate-50 p-3 rounded-xl text-xs border font-bold">
                        <textarea id="ev-memo" placeholder="📝 思い出メモ・座席番号など (任意)" class="w-full bg-slate-50 p-3 rounded-xl text-xs border font-bold h-16">${ev.memo || ''}</textarea>
                        <select id="ev-repeat" class="w-full bg-slate-50 p-3 rounded-xl text-xs border font-bold"><option value="none" ${ev.repeat === 'none' ? 'selected' : ''}>繰り返しなし</option><option value="weekly" ${ev.repeat === 'weekly' ? 'selected' : ''}>毎週</option><option value="monthly" ${ev.repeat === 'monthly' ? 'selected' : ''}>毎月</option></select>
                        <div class="flex gap-2 pt-2">
                            <button type="button" onclick="window.app.closeModal()" class="flex-1 bg-slate-100 py-3 rounded-2xl text-xs font-bold text-slate-500">戻る</button>
                            ${id ? `<button type="button" onclick="window.app.deleteEvent('${id}')" class="flex-1 bg-rose-50 text-rose-500 py-3 rounded-2xl text-xs font-bold">削除</button>` : ''}
                            <button type="submit" class="flex-1 bg-slate-700 text-white py-3 rounded-2xl text-xs font-bold">保存する</button>
                        </div>
                    </form>
                `);
                document.getElementById('ev-form').onsubmit = (e) => {
                    e.preventDefault();
                    const n = { id: id || 'ev' + Date.now(), startDate: document.getElementById('ev-start').value, endDate: document.getElementById('ev-end').value, startTime: document.getElementById('ev-stime').value, endTime: document.getElementById('ev-etime').value, name: document.getElementById('ev-name').value, location: document.getElementById('ev-loc').value, oshiId: document.getElementById('ev-oshi').value, categoryId: document.getElementById('ev-cat').value, repeat: document.getElementById('ev-repeat').value, isCountdown: document.getElementById('ev-count').checked, url: document.getElementById('ev-url').value, memo: document.getElementById('ev-memo').value };
                    if (id) this.events = this.events.map(x => x.id === id ? n : x); else this.events.push(n);
                    this.save(); this.closeModal(); this.renderCountdowns(); this.renderCalendar();
                };
            },
            deleteEvent: function(id) { if (confirm('予定を削除しますか？')) { this.events = this.events.filter(x => x.id !== id); this.save(); this.closeModal(); this.renderCountdowns(); this.renderCalendar(); } },

            openOshiModal: function() {
                this.showModal(`
                    <h3 class="font-bold mb-4 text-slate-700">推し設定</h3>
                    <form id="oshi-form" class="space-y-3 mb-4">
                        <input type="text" id="o-name" placeholder="推しの名前" required class="w-full bg-slate-50 p-3 rounded-xl text-sm border outline-none font-bold">
                        <div class="flex items-center gap-3 bg-slate-50 p-2 rounded-xl border"><span class="text-[10px] font-bold text-slate-400 ml-1">カラー</span><input type="color" id="o-color" value="#7dd3fc" class="flex-1 h-8 bg-transparent cursor-pointer"></div>
                        <div class="flex flex-col gap-1"><label class="text-[10px] font-bold text-slate-400 ml-1">誕生日 (日数表示用)</label><input type="date" id="o-bday" class="w-full bg-slate-50 p-3 rounded-xl text-sm border font-bold"></div>
                        <button type="submit" class="w-full bg-slate-700 text-white font-bold py-3 rounded-2xl text-xs shadow-md">追加する</button>
                    </form>
                    <div class="space-y-2 max-h-40 overflow-y-auto">${this.oshis.map(o => `<div class="flex justify-between items-center bg-white p-2 rounded-xl border shadow-sm"><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full" style="background-color:${o.color}"></div><span class="text-xs font-extrabold text-slate-600">${o.name}</span></div><button onclick="window.app.deleteOshi('${o.id}')" class="text-slate-300 text-xs px-3 font-bold">✕</button></div>`).join('')}</div>
                    <button onclick="window.app.closeModal()" class="w-full bg-slate-100 py-3 rounded-2xl text-xs font-bold mt-4 text-slate-500">閉じる</button>
                `);
                document.getElementById('oshi-form').onsubmit = (e) => {
                    e.preventDefault(); this.oshis.push({ id: 'o' + Date.now(), name: document.getElementById('o-name').value, color: document.getElementById('o-color').value, birthday: document.getElementById('o-bday').value });
                    this.save(); this.renderFilter(); this.openOshiModal(); this.renderCountdowns(); this.renderCalendar();
                };
            },
            deleteOshi: function(id) { if (confirm('この推しを解除しますか？')) { this.oshis = this.oshis.filter(x => x.id !== id); this.save(); this.activeOshiFilter='all'; this.applyTheme(); this.renderFilter(); this.openOshiModal(); this.renderCountdowns(); this.renderCalendar(); } },

            openConfigModal: function() {
                this.showModal(`
                    <h3 class="font-bold mb-4 text-slate-700">項目設定</h3>
                    <form id="cat-form" class="space-y-3 mb-4"><input type="text" id="c-name" placeholder="項目名 (例: ラジオ, 当選 etc)" required class="w-full bg-slate-50 p-3 rounded-xl text-sm border font-bold"><button type="submit" class="w-full bg-slate-700 text-white font-bold py-3 rounded-2xl text-xs shadow-md">追加する</button></form>
                    <div class="space-y-2 max-h-40 overflow-y-auto">${this.categories.map(c => `<div class="flex justify-between items-center bg-white p-2 rounded-xl border shadow-sm"><span class="text-xs font-extrabold text-slate-600 pl-2">${c.name}</span><button onclick="window.app.deleteCat('${c.id}')" class="text-slate-300 text-xs px-3 font-bold">✕</button></div>`).join('')}</div>
                    <button onclick="window.app.closeModal()" class="w-full bg-slate-100 py-3 rounded-2xl text-xs font-bold mt-4 text-slate-500">閉じる</button>
                `);
                document.getElementById('cat-form').onsubmit = (e) => {
                    e.preventDefault(); this.categories.push({ id: 'c' + Date.now(), name: document.getElementById('c-name').value });
                    this.save(); this.openConfigModal(); this.renderCalendar();
                };
            },
            deleteCat: function(id) { if (confirm('この項目を消去しますか？')) { this.categories = this.categories.filter(x => x.id !== id); this.save(); this.openConfigModal(); this.renderCalendar(); } },

            openSettingModal: function() {
                this.showModal(`
                    <h3 class="font-bold mb-4 text-slate-700">アプリ設定</h3>
                    <p class="text-[10px] text-slate-400 mb-2 font-bold">データの書き出し (機種変更など)</p>
                    <textarea id="back-data" class="w-full h-20 bg-slate-50 p-2 rounded-xl text-[8px] border outline-none font-mono text-slate-400">${JSON.stringify({oshis:this.oshis, events:this.events, cats:this.categories})}</textarea>
                    <button onclick="window.app.copyBackup()" class="w-full bg-sky-400 text-white py-3 rounded-xl text-xs font-bold mt-2 shadow-sm">データをコピーする</button>
                    <hr class="my-5 border-slate-100">
                    <p class="text-[10px] text-slate-400 mb-2 font-bold">データの読み込み (復元)</p>
                    <textarea id="import-data" placeholder="ここにデータを貼り付け" class="w-full h-20 bg-slate-50 p-2 rounded-xl text-[8px] border outline-none font-mono text-slate-400"></textarea>
                    <button onclick="window.app.importBackup()" class="w-full bg-slate-700 text-white py-3 rounded-xl text-xs font-bold mt-2 shadow-sm">データを読み込む</button>
                    <button onclick="window.app.closeModal()" class="w-full bg-slate-100 py-3 rounded-2xl text-xs font-bold mt-4 text-slate-500">閉じる</button>
                `);
            },
            copyBackup: function() { document.getElementById('back-data').select(); document.execCommand('copy'); alert('コピーしました！'); },
            importBackup: function() { try { const data = JSON.parse(document.getElementById('import-data').value); if (data.oshis) this.oshis = data.oshis; if (data.events) this.events = data.events; if (data.cats) this.categories = data.cats; this.save(); location.reload(); } catch(e) { alert('データ形式エラー'); } },

            selectDate: function(ds) { this.selectedDateStr = ds; this.renderCalendar(); },
            shiftMonth: function(dir) { this.baseMonth += dir; if (this.baseMonth < 0) { this.baseMonth = 11; this.baseYear--; } else if (this.baseMonth > 11) { this.baseMonth = 0; this.baseYear++; } this.renderCalendar(); },
            jumpToToday: function() { const now = new Date(); this.baseYear = now.getFullYear(); this.baseMonth = now.getMonth(); this.selectedDateStr = this.safeDateStr(now); this.renderCalendar(); }
        };

        window.app = App; window.onload = () => App.init();
    })();
    </script>
</body>
</html>
