<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oshikatsu Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #f0f9ff; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white/90 shadow-sm sticky top-0 z-30 p-4 border-b border-sky-100 flex justify-between items-center">
        <h1 class="text-lg font-bold text-sky-600">Oshikatsu Calendar</h1>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <section class="bg-white rounded-3xl p-4 shadow-sm">
            <div id="calendar-container" class="space-y-6"></div>
        </section>

        <section class="bg-white rounded-3xl p-4 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h3 id="selected-date-title" class="text-sm font-bold text-sky-700">日付を選択してください</h3>
                <button onclick="window.app.openEventModal()" class="bg-sky-400 text-white text-xs font-bold py-2 px-4 rounded-full">＋ Add</button>
            </div>
            <div id="daily-event-list" class="space-y-3"></div>
        </section>
    </main>

    <div id="event-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="font-bold mb-4">予定を登録</h3>
            <form id="event-form" class="space-y-3">
                <input type="date" id="e-date" required class="w-full bg-slate-50 p-3 rounded-xl text-sm">
                <input type="time" id="e-time" class="w-full bg-slate-50 p-3 rounded-xl text-sm">
                <input type="text" id="e-name" placeholder="予定の名前" required class="w-full bg-slate-50 p-3 rounded-xl text-sm">
                <input type="text" id="e-loc" placeholder="場所（Googleマップ検索用）" class="w-full bg-slate-50 p-3 rounded-xl text-sm">
                <select id="e-oshi" class="w-full bg-slate-50 p-3 rounded-xl text-sm"></select>
                <div class="flex gap-2 mt-4">
                    <button type="button" onclick="document.getElementById('event-modal').classList.add('hidden')" class="flex-1 bg-slate-200 py-2 rounded-xl text-sm font-bold">戻る</button>
                    <button type="submit" class="flex-1 bg-sky-500 text-white py-2 rounded-xl text-sm font-bold">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const App = {
            events: JSON.parse(localStorage.getItem('oshi_events')) || [],
            oshis: [{id:1, name:'推し1'}, {id:2, name:'推し2'}],

            init() {
                this.renderCalendar();
                document.getElementById('e-oshi').innerHTML = this.oshis.map(o => `<option value="${o.name}">${o.name}</option>`).join('');
                document.getElementById('event-form').onsubmit = (e) => {
                    e.preventDefault();
                    const newEvent = {
                        date: document.getElementById('e-date').value,
                        time: document.getElementById('e-time').value,
                        name: document.getElementById('e-name').value,
                        loc: document.getElementById('e-loc').value,
                        oshi: document.getElementById('e-oshi').value
                    };
                    this.events.push(newEvent);
                    localStorage.setItem('oshi_events', JSON.stringify(this.events));
                    document.getElementById('event-modal').classList.add('hidden');
                    this.selectDate(newEvent.date);
                };
            },

            renderCalendar() {
                const cont = document.getElementById('calendar-container');
                const now = new Date();
                let html = `<div class="calendar-grid text-center text-xs font-bold text-slate-400"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
                            <div class="calendar-grid text-center gap-1 mt-2">`;
                for(let d=1; d<=30; d++){
                    html += `<div class="p-2 rounded-lg bg-sky-50 cursor-pointer" onclick="window.app.selectDate('2026-06-${String(d).padStart(2,'0')}')">${d}</div>`;
                }
                cont.innerHTML = html + `</div>`;
            },

            selectDate(ds) {
                document.getElementById('selected-date-title').innerText = ds;
                document.getElementById('daily-event-list').innerHTML = this.events
                    .filter(ev => ev.date === ds)
                    .map(ev => `
                        <div class="p-4 bg-sky-50 rounded-2xl border-l-4 border-sky-400">
                            <div class="text-xs font-bold text-sky-600">${ev.time} | ${ev.oshi}</div>
                            <div class="text-sm font-bold mt-1">${ev.name}</div>
                            ${ev.loc ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.loc)}" target="_blank" class="text-xs text-blue-500 underline mt-1 block">📍 ${ev.loc}</a>` : ''}
                        </div>
                    `).join('') || '<div class="text-center text-xs text-slate-400">予定はありません</div>';
            },

            openEventModal() { document.getElementById('event-modal').classList.remove('hidden'); }
        };
        window.app = App; App.init();
    </script>
</body>
</html>
