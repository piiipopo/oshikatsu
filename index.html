<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>oshikatsu calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; }
        ::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    </style>
</head>
<body class="bg-sky-50/50 text-slate-700 font-sans antialiased pb-24">

    <!-- ヘッダー -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-sky-100 flex justify-between items-center">
        <h1 class="text-lg font-extrabold text-sky-600 tracking-tight">oshikatsu calendar</h1>
        <div class="flex gap-2">
            <button onclick="openOshiModal()" class="bg-sky-100 text-sky-600 border border-sky-200 text-xs font-bold py-2 px-3 rounded-2xl active:scale-95 transition-all">推し</button>
            <button onclick="openConfigModal()" class="bg-slate-100 text-slate-500 border border-slate-200 text-xs font-bold py-2 px-3 rounded-2xl active:scale-95 transition-all">項目</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <section id="notification-bar" class="hidden bg-sky-200 text-sky-900 rounded-3xl p-4 shadow-md shadow-sky-100 relative overflow-hidden">
            <h3 class="text-xs font-bold opacity-80 mb-1">Reminder</h3>
            <div id="urgent-events" class="space-y-1 text-sm font-bold opacity-90"></div>
        </section>

        <section class="bg-white rounded-3xl shadow-sm border border-sky-100 p-4">
            <div class="flex justify-between items-center mb-4">
                <button onclick="shiftMonth(-1)" class="text-xs text-sky-500 bg-sky-50 px-3 py-1.5 rounded-xl font-bold active:scale-95 transition-all border border-sky-100">&lt; Back</button>
                <button onclick="shiftMonth(1)" class="text-xs text-sky-500 bg-sky-50 px-3 py-1.5 rounded-xl font-bold active:scale-95 transition-all border border-sky-100">Next &gt;</button>
            </div>
            <div id="calendar-container" class="space-y-6"></div>
        </section>

        <section class="bg-white rounded-3xl shadow-sm border border-sky-100 p-4 sticky bottom-4 z-20">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold text-slate-600">Events</h3>
                <button onclick="openEventModal()" class="bg-sky-300 text-white text-xs font-bold py-2 px-3 rounded-2xl shadow-sm shadow-sky-100 active:scale-95 transition-all">＋ Add</button>
            </div>
            <div id="daily-event-list" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
        </section>
    </main>

    <!-- モーダル -->
    <div id="event-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl">
            <h3 id="modal-title" class="text-base font-bold text-slate-700 mb-4">予定を登録</h3>
            <form id="event-form" class="space-y-3">
                <input type="hidden" id="event-id">
                <input type="date" id="event-date" required class="w-full bg-slate-50 border p-3 rounded-2xl text-sm font-bold">
                <select id="event-oshi" required class="w-full bg-slate-50 border p-3 rounded-2xl text-sm font-bold"></select>
                <select id="event-category" required class="w-full bg-slate-50 border p-3 rounded-2xl text-sm font-bold"></select>
                <select id="event-repeat" class="w-full bg-slate-50 border p-3 rounded-2xl text-sm font-bold text-sky-600">
                    <option value="none">繰り返し：なし</option>
                    <option value="weekly">毎週</option>
                    <option value="monthly">毎月</option>
                </select>
                <input type="text" id="event-name" placeholder="タイトル" required class="w-full bg-slate-50 border p-3 rounded-2xl text-sm">
                <div class="flex gap-2">
                    <button type="button" onclick="closeEventModal()" class="flex-1 bg-slate-100 py-3 rounded-2xl text-sm font-bold">戻る</button>
                    <button type="submit" class="flex-1 bg-sky-300 text-white py-3 rounded-2xl text-sm font-bold">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let baseYear, baseMonth, selectedDateStr;
        let oshis = JSON.parse(localStorage.getItem('oshi_list')) || [{ id: 'o1', name: '推し', color: '#0ea5e9' }];
        let categories = JSON.parse(localStorage.getItem('cat_list')) || [{ id: 'c1', name: 'LIVE' }, { id: 'c2', name: '当落発表' }];
        let events = JSON.parse(localStorage.getItem('oshi_events')) || [];

        function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

        // イベント取得（繰り返し判定付き）
        function getEventsForDay(dateStr) {
            const d = new Date(dateStr);
            return events.filter(e => {
                if (e.repeat === 'weekly') {
                    return new Date(e.date).getDay() === d.getDay() && d >= new Date(e.date);
                } else if (e.repeat === 'monthly') {
                    return new Date(e.date).getDate() === d.getDate() && d >= new Date(e.date);
                }
                return e.date === dateStr;
            });
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-container'); container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                let y = baseYear; let m = baseMonth + i; if(m > 11){m-=12; y++}
                const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
                let html = `<h2 class="text-xs font-bold text-sky-400 mb-2">${y}年 ${m+1}月</h2><div class="calendar-grid mb-2 text-[9px] text-slate-300 font-bold"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div><div class="calendar-grid gap-1">`;
                for(let k=0; k<first; k++) html += `<div></div>`;
                for(let d=1; d<=last; d++){
                    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const evs = getEventsForDay(ds);
                    html += `<div class="p-1 min-h-[40px] rounded-2xl flex flex-col justify-center items-center text-xs font-bold cursor-pointer ${ds === selectedDateStr ? 'bg-sky-200 text-white' : 'text-slate-500 hover:bg-sky-50'}" onclick="selectDate('${ds}')">${d}<div class="flex gap-0.5 mt-1">${evs.map(e => `<div class="w-1.5 h-1.5 rounded-full" style="background-color:${oshis.find(o=>o.id===e.oshiId)?.color}"></div>`).join('')}</div></div>`;
                }
                container.innerHTML += `<div>${html}</div></div>`;
            }
            renderDailyEvents();
        }

        // 保存ロジック（繰り返し対応）
        document.getElementById('event-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newEv = {
                id: Date.now().toString(),
                date: document.getElementById('event-date').value,
                oshiId: document.getElementById('event-oshi').value,
                categoryId: document.getElementById('event-category').value,
                repeat: document.getElementById('event-repeat').value,
                name: document.getElementById('event-name').value
            };
            events.push(newEv);
            localStorage.setItem('oshi_events', JSON.stringify(events));
            document.getElementById('event-modal').classList.add('hidden');
            renderCalendar();
        });

        // 描画系の関数（renderDailyEvents等は以前のロジックにbadge判定を追加）
        function renderDailyEvents() {
            const list = document.getElementById('daily-event-list');
            const evs = getEventsForDay(selectedDateStr);
            list.innerHTML = evs.length ? evs.map(ev => {
                const cat = categories.find(c => c.id === ev.categoryId);
                const isResult = cat && cat.name.includes('当落');
                return `<div class="p-3 bg-sky-50 rounded-2xl flex items-center gap-3">
                    <div class="w-2 h-8 rounded-full" style="background-color:${oshis.find(o=>o.id===ev.oshiId)?.color}"></div>
                    <div>
                        <div class="text-[10px] font-bold text-sky-600">${isResult ? '★当落★ ' : ''}${ev.name}</div>
                    </div>
                </div>`;
            }).join('') : '<div class="text-center text-slate-400 text-xs py-4">予定なし</div>';
        }

        function selectDate(s) { selectedDateStr = s; renderCalendar(); }
        function shiftMonth(dir) { baseMonth += dir; if(baseMonth<0){baseMonth=11; baseYear--} else if(baseMonth>11){baseMonth=0; baseYear++} renderCalendar(); }
        function openEventModal() { 
            document.getElementById('event-oshi').innerHTML = oshis.map(o => `<option value="${o.id}">${o.name}</option>`).join('');
            document.getElementById('event-category').innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('event-modal').classList.remove('hidden'); 
        }
        function closeEventModal() { document.getElementById('event-modal').classList.add('hidden'); }
        
        // 推し/項目設定は前回同様のロジック（省略）
        renderCalendar();
    </script>
</body>
</html>
