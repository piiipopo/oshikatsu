<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>oshikatsu calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; }
        ::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    </style>
</head>
<body class="bg-rose-50/50 text-slate-700 font-sans antialiased pb-24">

    <!-- ヘッダー -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-rose-100 flex justify-between items-center">
        <h1 class="text-lg font-extrabold text-pink-400 flex items-center gap-1.5 tracking-tight">
            <span>📅</span> oshikatsu calendar
        </h1>
        <div class="flex gap-2">
            <button onclick="openOshiModal()" class="bg-pink-100 text-pink-500 border border-pink-200 text-xs font-bold py-2 px-3 rounded-2xl active:scale-95 transition-all">
                推し登録
            </button>
            <button onclick="openConfigModal()" class="bg-slate-100 text-slate-500 border border-slate-200 text-xs font-bold py-2 px-3 rounded-2xl active:scale-95 transition-all">
                項目登録
            </button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="p-4 max-w-md mx-auto space-y-4">
        
        <!-- リマインダー -->
        <section id="notification-bar" class="hidden bg-gradient-to-br from-pink-200 to-sky-200 text-pink-900 rounded-3xl p-4 shadow-lg shadow-pink-100 relative overflow-hidden">
            <div class="absolute -right-4 -bottom-4 text-white opacity-40 text-7xl font-bold">📢</div>
            <h3 class="text-xs font-bold opacity-80 mb-1 flex items-center gap-1">
                <span class="animate-pulse">🔔</span> リマインダー
            </h3>
            <div id="urgent-events" class="space-y-1 text-sm font-bold opacity-90"></div>
        </section>

        <!-- カレンダーエリア -->
        <section class="bg-white rounded-3xl shadow-sm border border-rose-100 p-4">
            <div class="flex justify-between items-center mb-4">
                <button onclick="shiftMonth(-1)" class="text-xs text-pink-400 bg-pink-50 px-3 py-1.5 rounded-xl font-bold active:scale-95 transition-all border border-pink-100">
                    &lt; 前へ
                </button>
                <button onclick="shiftMonth(1)" class="text-xs text-pink-400 bg-pink-50 px-3 py-1.5 rounded-xl font-bold active:scale-95 transition-all border border-pink-100">
                    次へ &gt;
                </button>
            </div>
            <div id="calendar-container" class="space-y-6"></div>
        </section>

        <!-- 選択日の予定リスト -->
        <section class="bg-white rounded-3xl shadow-sm border border-rose-100 p-4 sticky bottom-4 z-20">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold text-slate-600 flex items-center gap-1.5">
                    選択日の予定
                </h3>
                <button onclick="openEventModal()" class="bg-pink-300 text-white text-xs font-bold py-2 px-3 rounded-2xl shadow-md shadow-pink-100 active:scale-95 transition-all flex items-center gap-1">
                    ➕ 予定追加
                </button>
            </div>
            <div id="daily-event-list" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
        </section>
    </main>

    <!-- 各種モーダル（デザイン統一） -->
    <div id="event-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl">
            <h3 id="modal-title" class="text-base font-bold text-slate-700 mb-4">予定を登録</h3>
            <form id="event-form" class="space-y-4">
                <input type="hidden" id="event-id">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">イベント日</label>
                    <input type="date" id="event-date" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-3 text-sm font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-pink-200">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">誰の予定？</label>
                    <select id="event-oshi" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-3 text-sm font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-pink-200"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">種類</label>
                    <select id="event-category" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-3 text-sm font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-pink-200"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">タイトル</label>
                    <input type="text" id="event-name" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-3 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-pink-200">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeEventModal()" class="flex-1 bg-slate-100 text-slate-500 font-bold py-3 rounded-2xl text-sm active:scale-95 transition-all">戻る</button>
                    <button type="submit" class="flex-1 bg-pink-300 text-white font-bold py-3 rounded-2xl text-sm shadow-md shadow-pink-100 active:scale-95 transition-all">保存</button>
                </div>
                <div id="delete-btn-container" class="hidden text-center pt-1">
                    <button type="button" onclick="deleteCurrentEvent()" class="text-xs text-rose-300 font-bold underline p-1">削除</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 他のモーダル(推し・設定)は省略（同様にrounded-3xlで構成） -->
    <script>
        // --- データの初期状態と管理 ---
        let baseYear, baseMonth, selectedDateStr;
        let oshis = JSON.parse(localStorage.getItem('oshi_list')) || [{ id: 'o1', name: '推し', color: '#f472b6' }];
        let categories = JSON.parse(localStorage.getItem('cat_list')) || [{ id: 'c1', name: 'LIVE' }, { id: 'c2', name: 'TV' }];
        let events = JSON.parse(localStorage.getItem('oshi_events')) || [];

        function saveData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
        const today = new Date();
        baseYear = today.getFullYear();
        baseMonth = today.getMonth();
        selectedDateStr = formatDate(today);

        function formatDate(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function shiftMonth(dir) {
            baseMonth += dir;
            if (baseMonth < 0) { baseMonth = 11; baseYear--; } 
            else if (baseMonth > 11) { baseMonth = 0; baseYear++; }
            renderCalendar();
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                let y = baseYear; let m = baseMonth + i;
                if (m > 11) { m -= 12; y++; }
                container.innerHTML += buildMonthHTML(y, m);
            }
            renderDailyEvents();
            renderUrgentNotifications();
        }

        function buildMonthHTML(year, month) {
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDayOfWeek = firstDay.getDay();
            const totalDays = lastDay.getDate();

            let cellsHtml = `<div class="calendar-grid gap-1.5">`;
            for (let i = 0; i < startDayOfWeek; i++) cellsHtml += `<div></div>`;
            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = dateStr === selectedDateStr;
                const dayEvents = events.filter(e => e.date === dateStr);
                
                let dotsHtml = '<div class="flex justify-center gap-0.5 mt-1">';
                dayEvents.forEach((ev, idx) => {
                    if (idx < 3) {
                        const oshi = oshis.find(o => o.id === ev.oshiId) || { color: '#cbd5e1' };
                        dotsHtml += `<div class="w-1.5 h-1.5 rounded-full" style="background-color: ${oshi.color}"></div>`;
                    }
                });
                dotsHtml += '</div>';

                let cellClass = "p-1 min-h-[40px] rounded-2xl flex flex-col justify-center items-center text-xs font-bold cursor-pointer transition-all ";
                if (isSelected) cellClass += "bg-pink-200 text-white shadow-md";
                else cellClass += "text-slate-500 hover:bg-pink-50";

                cellsHtml += `<div class="${cellClass}" onclick="selectDate('${dateStr}')">${day}${dotsHtml}</div>`;
            }
            return `<div><h2 class="text-xs font-extrabold text-slate-400 mb-2">${year}年 ${month+1}月</h2><div class="calendar-grid mb-2 text-[9px] text-slate-300 font-bold"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div>${cellsHtml}</div></div>`;
        }

        function selectDate(dateStr) { selectedDateStr = dateStr; renderCalendar(); }

        // 省略: 他のrender関数などは前回と同じですが、カラーコードをtailwindのパステル系に変えるとさらにふわふわになります！
        // （上記コードは主要部分のみ記載しています。全体をコピペしてください）
    </script>
</body>
</html>
