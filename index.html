<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>oshikatsu calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; }
        ::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-24">

    <!-- ヘッダー -->
    <header class="bg-white shadow-sm sticky top-0 z-30 p-4 border-b border-gray-100 flex justify-between items-center">
        <h1 class="text-lg font-extrabold text-cyan-600 flex items-center gap-1.5">
            <span>📅</span> oshikatsu calendar
        </h1>
        <div class="flex gap-2">
            <button onclick="openOshiModal()" class="bg-cyan-50 text-cyan-600 border border-cyan-200 text-xs font-bold py-2 px-3 rounded-xl active:scale-95 transition-all">
                👑 推し設定
            </button>
            <button onclick="openConfigModal()" class="bg-slate-50 text-slate-600 border border-slate-200 text-xs font-bold py-2 px-3 rounded-xl active:scale-95 transition-all">
                🏷️ 項目編集
            </button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="p-4 max-w-md mx-auto space-y-4">
        
        <!-- リマインダー / 通知エリア -->
        <section id="notification-bar" class="hidden bg-gradient-to-r from-cyan-500 to-blue-500 text-white rounded-2xl p-4 shadow-md shadow-cyan-100 relative overflow-hidden">
            <div class="absolute -right-4 -bottom-4 text-white opacity-10 text-7xl font-bold">📢</div>
            <h3 class="text-xs font-bold opacity-90 mb-1 flex items-center gap-1">
                <span class="animate-pulse">🔔</span> 本日・明日の推し事リマインダー
            </h3>
            <div id="urgent-events" class="space-y-1 text-sm font-bold">
                <!-- 動的生成 -->
            </div>
        </section>

        <!-- 3ヶ月カレンダーエリア -->
        <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
            <!-- スクロール用の月切り替えボタン -->
            <div class="flex justify-between items-center mb-4">
                <button onclick="shiftMonth(-1)" class="text-xs text-cyan-600 bg-cyan-50 px-3 py-1.5 rounded-lg font-bold active:scale-95 transition-all border border-cyan-100">
                    &lt; 1ヶ月前へ
                </button>
                <button onclick="shiftMonth(1)" class="text-xs text-cyan-600 bg-cyan-50 px-3 py-1.5 rounded-lg font-bold active:scale-95 transition-all border border-cyan-100">
                    1ヶ月後へ &gt;
                </button>
            </div>
            
            <!-- カレンダー本体（3ヶ月分動的生成） -->
            <div id="calendar-container" class="space-y-6">
            </div>
        </section>

        <!-- 選択日の予定リスト -->
        <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sticky bottom-4 z-20">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold text-gray-600 flex items-center gap-1.5">
                    選択日の予定
                </h3>
                <button onclick="openEventModal()" class="bg-cyan-600 text-white text-xs font-bold py-2 px-3 rounded-xl shadow-sm shadow-cyan-100 active:scale-95 transition-all flex items-center gap-1">
                    ➕ 予定を追加
                </button>
            </div>
            <div id="daily-event-list" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                <!-- 動的生成 -->
            </div>
        </section>

    </main>

    <!-- モーダル：予定追加・編集 -->
    <div id="event-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-5 shadow-xl animate-in fade-in zoom-in-95 duration-150">
            <h3 id="modal-title" class="text-base font-bold text-gray-800 mb-4">予定を登録する</h3>
            <form id="event-form" class="space-y-4">
                <input type="hidden" id="event-id">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">お買い物・イベント日</label>
                    <input type="date" id="event-date" required class="w-full bg-slate-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-gray-700 focus:outline-none focus:ring-2 focus:ring-cyan-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">誰の予定？（推し）</label>
                    <select id="event-oshi" required class="w-full bg-slate-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-gray-700 focus:outline-none focus:ring-2 focus:ring-cyan-500">
                        <!-- 動的生成 -->
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">予定の種類（項目）</label>
                    <select id="event-category" required class="w-full bg-slate-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-gray-700 focus:outline-none focus:ring-2 focus:ring-cyan-500">
                        <!-- 動的生成 -->
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">タイトル</label>
                    <input type="text" id="event-name" placeholder="例: ○○出演、雑誌発売など" required class="w-full bg-slate-50 border border-gray-200 rounded-xl p-3 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-cyan-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">メモ・詳細 <span class="text-[10px] text-gray-400 font-normal">(任意)</span></label>
                    <textarea id="event-memo" placeholder="例: 21:00〜 録画忘れないこと！" class="w-full bg-slate-50 border border-gray-200 rounded-xl p-3 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-cyan-500 h-16 resize-none"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeEventModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl text-sm active:scale-95 transition-all">キャンセル</button>
                    <button type="submit" class="flex-1 bg-cyan-600 text-white font-bold py-3 rounded-xl text-sm shadow-md shadow-cyan-100 active:scale-95 transition-all">保存する</button>
                </div>
                <div id="delete-btn-container" class="hidden text-center pt-1">
                    <button type="button" onclick="deleteCurrentEvent()" class="text-xs text-red-400 font-bold underline p-1">この予定を削除する</button>
                </div>
            </form>
        </div>
    </div>

    <!-- モーダル：推し登録機能 -->
    <div id="oshi-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-5 shadow-xl max-h-[85vh] flex flex-col">
            <h3 class="text-base font-bold text-gray-800 mb-3 flex-shrink-0">👑 推しメンバー登録</h3>
            
            <form id="oshi-form" class="space-y-3 mb-4 flex-shrink-0 bg-slate-50 p-3 rounded-xl border border-gray-100">
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-2">
                        <input type="text" id="new-oshi-name" placeholder="推しの名前" required class="w-full bg-white border border-gray-200 rounded-lg p-2 text-xs font-bold text-gray-700">
                    </div>
                    <div>
                        <input type="color" id="new-oshi-color" value="#06b6d4" class="w-full h-8 bg-white border border-gray-200 rounded-lg cursor-pointer">
                    </div>
                </div>
                <button type="submit" class="w-full bg-cyan-600 text-white font-bold py-2 rounded-lg text-xs shadow-sm active:scale-95 transition-all">新しい推しを追加</button>
            </form>

            <div class="overflow-y-auto flex-1 pr-1 space-y-2" id="oshi-list-container">
                <!-- 動的生成 -->
            </div>
            
            <button onclick="closeOshiModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-2.5 rounded-xl text-xs mt-4 flex-shrink-0">閉じる</button>
        </div>
    </div>

    <!-- モーダル：項目（カテゴリ）編集 -->
    <div id="config-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-5 shadow-xl max-h-[85vh] flex flex-col">
            <h3 class="text-base font-bold text-gray-800 mb-3 flex-shrink-0">🏷️ 予定タイプの編集</h3>
            
            <form id="cat-form" class="space-y-3 mb-4 flex-shrink-0 bg-slate-50 p-3 rounded-xl border border-gray-100">
                <input type="text" id="new-cat-name" placeholder="新カテゴリ名 (例: ラジオ、雑誌)" required class="w-full bg-white border border-gray-200 rounded-lg p-2 text-xs font-bold text-gray-700">
                <button type="submit" class="w-full bg-slate-700 text-white font-bold py-2 rounded-lg text-xs shadow-sm active:scale-95 transition-all">項目を追加</button>
            </form>

            <div class="overflow-y-auto flex-1 pr-1 space-y-2" id="cat-list-container">
                <!-- 動的生成 -->
            </div>
            
            <button onclick="closeConfigModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-2.5 rounded-xl text-xs mt-4 flex-shrink-0">閉じる</button>
        </div>
    </div>

    <script>
        // --- データの初期状態と管理 ---
        let baseYear, baseMonth, selectedDateStr;

        let oshis = JSON.parse(localStorage.getItem('oshi_list')) || [
            { id: 'o1', name: '全員・グループ', color: '#06b6d4' }
        ];

        let categories = JSON.parse(localStorage.getItem('cat_list')) || [
            { id: 'c1', name: 'LIVE' },
            { id: 'c2', name: 'TV出演' },
            { id: 'c3', name: '新曲発売' },
            { id: 'c4', name: 'SNS・YouTube' }
        ];

        let events = JSON.parse(localStorage.getItem('oshi_events')) || [];

        function saveData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        // --- 初期化 ---
        const today = new Date();
        baseYear = today.getFullYear();
        baseMonth = today.getMonth();
        selectedDateStr = formatDate(today);

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // --- ユーティリティ ---
        function formatDate(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // --- カレンダー描画ロジック ---
        function shiftMonth(dir) {
            baseMonth += dir;
            if (baseMonth < 0) {
                baseMonth = 11;
                baseYear--;
            } else if (baseMonth > 11) {
                baseMonth = 0;
                baseYear++;
            }
            renderCalendar();
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';

            // 3ヶ月分をループで生成
            for (let i = 0; i < 3; i++) {
                let y = baseYear;
                let m = baseMonth + i;
                if (m > 11) {
                    m -= 12;
                    y++;
                }
                container.innerHTML += buildMonthHTML(y, m);
            }

            renderDailyEvents();
            renderUrgentNotifications();
        }

        function buildMonthHTML(year, month) {
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDayOfWeek = firstDay.getDay();
            const totalDays = lastDay.getDate();

            const titleHtml = `<h2 class="text-sm font-extrabold text-gray-600 font-mono mb-2 border-b border-slate-100 pb-1">${year}年 ${String(month + 1).padStart(2, '0')}月</h2>`;
            
            const headerHtml = `
            <div class="calendar-grid text-center text-[10px] font-bold text-gray-400 mb-1">
                <div class="text-red-400">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-400">土</div>
            </div>`;

            let cellsHtml = `<div class="calendar-grid gap-y-1.5">`;
            
            for (let i = 0; i < startDayOfWeek; i++) {
                cellsHtml += `<div></div>`;
            }

            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = dateStr === selectedDateStr;
                const isToday = formatDate(new Date()) === dateStr;

                const dayEvents = events.filter(e => e.date === dateStr);

                let dotsHtml = '<div class="flex justify-center gap-0.5 mt-1 h-1 overflow-hidden">';
                dayEvents.forEach((ev, idx) => {
                    if (idx < 3) {
                        const oshi = oshis.find(o => o.id === ev.oshiId) || { color: '#cbd5e1' };
                        dotsHtml += `<div class="w-1.5 h-1.5 rounded-full" style="background-color: ${oshi.color}"></div>`;
                    }
                });
                dotsHtml += '</div>';

                let cellClass = "p-1.5 min-h-[44px] rounded-xl flex flex-col justify-between items-center text-xs font-bold cursor-pointer transition-all active:scale-95 ";
                if (isSelected) {
                    cellClass += "bg-cyan-600 text-white shadow-sm shadow-cyan-100";
                } else if (isToday) {
                    cellClass += "bg-cyan-50 text-cyan-600 border border-cyan-200";
                } else {
                    const dayOfWeek = new Date(year, month, day).getDay();
                    if (dayOfWeek === 0) cellClass += "text-red-400 hover:bg-red-50/50";
                    else if (dayOfWeek === 6) cellClass += "text-blue-400 hover:bg-blue-50/50";
                    else cellClass += "text-gray-700 hover:bg-slate-50";
                }

                cellsHtml += `
                    <div class="${cellClass}" onclick="selectDate('${dateStr}')">
                        <span class="${isSelected ? 'text-white' : ''}">${day}</span>
                        ${dotsHtml}
                    </div>
                `;
            }
            cellsHtml += `</div>`;

            return `<div>${titleHtml}${headerHtml}${cellsHtml}</div>`;
        }

        function selectDate(dateStr) {
            selectedDateStr = dateStr;
            renderCalendar(); // 全体を再描画して選択状態を更新
        }

        // --- 選択日の予定一覧表示 ---
        function renderDailyEvents() {
            const list = document.getElementById('daily-event-list');
            const title = document.getElementById('selected-date-title');
            
            const displayDate = selectedDateStr.replace(/-/g, '/');
            title.innerHTML = `📅 ${displayDate} の予定`;

            const dayEvents = events.filter(e => e.date === selectedDateStr);
            list.innerHTML = '';

            if (dayEvents.length === 0) {
                list.innerHTML = `<div class="text-center text-gray-400 text-xs py-6">予定はありません</div>`;
                return;
            }

            dayEvents.forEach(ev => {
                const oshi = oshis.find(o => o.id === ev.oshiId) || { name: '未設定', color: '#cbd5e1' };
                const cat = categories.find(c => c.id === ev.categoryId) || { name: 'その他' };

                list.innerHTML += `
                    <div onclick="openEditEventModal('${ev.id}')" class="p-3 bg-slate-50 rounded-xl border border-gray-100 flex items-start gap-2.5 cursor-pointer active:bg-slate-100 transition-colors">
                        <div class="w-1.5 h-10 rounded-full flex-shrink-0" style="background-color: ${oshi.color}"></div>
                        <div class="min-w-0 flex-1">
                            <div class="flex items-center gap-1.5 flex-wrap mb-1">
                                <span class="text-[9px] font-extrabold px-1.5 py-0.5 rounded text-white" style="background-color: ${oshi.color}">${oshi.name}</span>
                                <span class="text-[9px] font-bold bg-white text-slate-500 border border-slate-200 px-1.5 py-0.5 rounded">${cat.name}</span>
                            </div>
                            <h4 class="text-sm font-bold text-gray-800 truncate">${ev.name}</h4>
                            ${ev.memo ? `<p class="text-[11px] text-gray-400 truncate mt-0.5">${ev.memo}</p>` : ''}
                        </div>
                        <span class="text-xs text-gray-300">✏️</span>
                    </div>
                `;
            });
        }

        // --- 本日・明日の通知バー表示 ---
        function renderUrgentNotifications() {
            const bar = document.getElementById('notification-bar');
            const container = document.getElementById('urgent-events');
            
            const tDate = formatDate(new Date());
            const tmr = new Date();
            tmr.setDate(tmr.getDate() + 1);
            const tmrDate = formatDate(tmr);

            const urgents = events.filter(e => e.date === tDate || e.date === tmrDate);
            container.innerHTML = '';

            if (urgents.length === 0) {
                bar.classList.add('hidden');
                return;
            }

            bar.classList.remove('hidden');
            urgents.forEach(ev => {
                const prefix = ev.date === tDate ? '【本日】' : '【明日】';
                const oshi = oshis.find(o => o.id === ev.oshiId) || { name: '' };
                container.innerHTML += `
                    <div class="truncate opacity-95">
                        ${prefix} [${oshi.name}] ${ev.name} ${ev.memo ? `(${ev.memo})` : ''}
                    </div>
                `;
            });
        }

        // --- モーダル制御：イベント作成・編集 ---
        function openEventModal() {
            document.getElementById('modal-title').textContent = "予定を登録する";
            document.getElementById('event-id').value = '';
            document.getElementById('event-date').value = selectedDateStr;
            document.getElementById('event-name').value = '';
            document.getElementById('event-memo').value = '';
            document.getElementById('delete-btn-container').classList.add('hidden');
            
            updateSelectOptions();
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function openEditEventModal(id) {
            const ev = events.find(e => e.id === id);
            if (!ev) return;

            document.getElementById('modal-title').textContent = "予定を編集・変更";
            document.getElementById('event-id').value = ev.id;
            document.getElementById('event-date').value = ev.date;
            document.getElementById('event-name').value = ev.name;
            document.getElementById('event-memo').value = ev.memo;
            document.getElementById('delete-btn-container').classList.remove('hidden');
            
            updateSelectOptions();
            document.getElementById('event-oshi').value = ev.oshiId;
            document.getElementById('event-category').value = ev.categoryId;
            
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function closeEventModal() {
            document.getElementById('event-modal').classList.add('hidden');
        }

        function updateSelectOptions() {
            const oshiSel = document.getElementById('event-oshi');
            oshiSel.innerHTML = '';
            oshis.forEach(o => {
                oshiSel.innerHTML += `<option value="${o.id}">${o.name}</option>`;
            });

            const catSel = document.getElementById('event-category');
            catSel.innerHTML = '';
            categories.forEach(c => {
                catSel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
        }

        // 予定保存送信
        document.getElementById('event-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('event-id').value;
            const date = document.getElementById('event-date').value;
            const oshiId = document.getElementById('event-oshi').value;
            const categoryId = document.getElementById('event-category').value;
            const name = document.getElementById('event-name').value.trim();
            const memo = document.getElementById('event-memo').value.trim();

            if (id) {
                const index = events.findIndex(e => e.id === id);
                if (index !== -1) {
                    events[index] = { id, date, oshiId, categoryId, name, memo };
                }
            } else {
                const newEv = { id: Date.now().toString(), date, oshiId, categoryId, name, memo };
                events.push(newEv);
            }

            events.sort((a, b) => new Date(a.date) - new Date(b.date));
            saveData('oshi_events', events);
            closeEventModal();
            
            // 予定を追加した日を選択状態にする
            selectedDateStr = date;
            
            // 入力された日付が現在表示中の3ヶ月の範囲外なら、基準月を移動させる
            const dObj = new Date(date);
            const inputY = dObj.getFullYear();
            const inputM = dObj.getMonth();
            
            const inputAbsolute = inputY * 12 + inputM;
            const baseAbsolute = baseYear * 12 + baseMonth;
            
            if (inputAbsolute < baseAbsolute || inputAbsolute > baseAbsolute + 2) {
                baseYear = inputY;
                baseMonth = inputM;
            }

            renderCalendar();
        });

        function deleteCurrentEvent() {
            const id = document.getElementById('event-id').value;
            if (id && confirm('この予定を削除してもよろしいですか？')) {
                events = events.filter(e => e.id !== id);
                saveData('oshi_events', events);
                closeEventModal();
                renderCalendar();
            }
        }

        // --- モーダル制御：推し登録機能 ---
        function openOshiModal() {
            renderOshiList();
            document.getElementById('oshi-modal').classList.remove('hidden');
        }

        function closeOshiModal() {
            document.getElementById('oshi-modal').classList.add('hidden');
            renderCalendar();
        }

        function renderOshiList() {
            const container = document.getElementById('oshi-list-container');
            container.innerHTML = '';
            oshis.forEach(o => {
                const isDefault = o.id === 'o1';
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2.5 rounded-xl border border-gray-100">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full" style="background-color: ${o.color}"></div>
                            <span class="text-xs font-bold text-gray-700">${o.name}</span>
                        </div>
                        ${!isDefault ? `<button onclick="deleteOshi('${o.id}')" class="text-xs text-gray-300 hover:text-red-400 px-2 py-1">✕</button>` : '<span class="text-[9px] text-gray-400 font-bold px-2">固定</span>'}
                    </div>
                `;
            });
        }

        document.getElementById('oshi-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const nameIn = document.getElementById('new-oshi-name');
            const colorIn = document.getElementById('new-oshi-color');
            
            const newOshi = {
                id: 'oshi_' + Date.now(),
                name: nameIn.value.trim(),
                color: colorIn.value
            };

            oshis.push(newOshi);
            saveData('oshi_list', oshis);
            nameIn.value = '';
            renderOshiList();
        });

        window.deleteOshi = function(id) {
            if (confirm('この推しを解除・削除しますか？ (紐づく予定のカラーはリセットされます)')) {
                oshis = oshis.filter(o => o.id !== id);
                saveData('oshi_list', oshis);
                renderOshiList();
            }
        };

        // --- モーダル制御：項目設定（カテゴリ） ---
        function openConfigModal() {
            renderCatList();
            document.getElementById('config-modal').classList.remove('hidden');
        }

        function closeConfigModal() {
            document.getElementById('config-modal').classList.add('hidden');
            renderCalendar();
        }

        function renderCatList() {
            const container = document.getElementById('cat-list-container');
            container.innerHTML = '';
            categories.forEach(c => {
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2.5 rounded-xl border border-gray-100">
                        <span class="text-xs font-bold text-gray-700">🏷️ ${c.name}</span>
                        <button onclick="deleteCat('${c.id}')" class="text-xs text-gray-300 hover:text-red-400 px-2 py-1">✕</button>
                    </div>
                `;
            });
        }

        document.getElementById('cat-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const nameIn = document.getElementById('new-cat-name');
            
            const newCat = {
                id: 'cat_' + Date.now(),
                name: nameIn.value.trim()
            };

            categories.push(newCat);
            saveData('cat_list', categories);
            nameIn.value = '';
            renderCatList();
        });

        window.deleteCat = function(id) {
            if (confirm('この予定タイプを削除しますか？')) {
                categories = categories.filter(c => c.id !== id);
                saveData('cat_list', categories);
                renderCatList();
            }
        };

        // 最初のレンダリング
        renderCalendar();
    </script>
</body>
</html>
