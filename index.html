<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oshikatsu Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; touch-action: manipulation; transition: background-color 0.4s ease; }
        ::-webkit-scrollbar { display: none; }
        
        /* 枠固定の神設定：minmax(0, 1fr)で絶対に横幅を均等に保つ */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, minmax(0, 1fr)); 
            width: 100%;
        }

        .modal-overlay { background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); }
        .scale-active:active { transform: scale(0.96); transition: transform 0.1s; }
        .shot-mode .hide-in-shot { display: none !important; }
        
        /* 枠を突き破るけどクリックは通す設定 */
        .uchiwa-container {
            position: relative;
            z-index: 10;
            pointer-events: none; /* クリックを一切邪魔しない */
        }
        .uchiwa-text {
            display: block;
            white-space: nowrap;
            overflow: visible;
        }
    </style>
</head>
<body id="app-body" class="bg-sky-50 text-slate-700 antialiased pb-24">

    <header id="main-header" class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-white/50 flex justify-between items-center transition-colors duration-400">
        <h1 onclick="window.app.editTitle()" class="text-lg font-extrabold text-slate-700 flex items-center gap-1.5 opacity-90 cursor-pointer scale-active">
            📅 <span id="app-title-text"></span>
        </h1>
        <div class="flex gap-2 hide-in-shot">
            <button onclick="window.app.requestNotif()" class="w-9 h-9 bg-white/80 text-lg rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">🔔</button>
            <button onclick="window.app.toggleScreenshotMode()" class="w-9 h-9 bg-white/80 text-lg rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">📸</button>
            <button onclick="window.app.openSettingModal()" class="w-9 h-9 bg-white/80 text-lg rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">⚙️</button>
            <button onclick="window.app.openConfigModal()" class="w-9 h-9 bg-white/80 text-lg rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">🏷️</button>
            <button onclick="window.app.openOshiModal()" class="w-9 h-9 bg-white/80 text-lg rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">🩵</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <div id="countdown-container"></div>
        <div class="flex items-center justify-between px-1 mb-1">
            <div id="oshi-filter-container" class="flex gap-2 overflow-x-auto flex-1 hide-in-shot pb-1"></div>
            <button onclick="window.app.openEventListModal()" class="shrink-0 bg-white text-sky-500 text-[10px] font-bold py-2 px-3 rounded-full ml-2 shadow-sm hide-in-shot border border-sky-100 scale-active">📋 一覧・編集</button>
        </div>

        <section class="bg-white/80 backdrop-blur-sm rounded-3xl p-4 shadow-sm border border-white">
            <div class="flex justify-between items-center mb-4 px-1">
                <button onclick="window.app.shiftMonth(-1)" class="text-xs text-slate-400 font-bold scale-active hide-in-shot">< Back</button>
                <div class="flex items-center gap-2">
                    <h2 onclick="window.app.openMonthPicker()" class="text-sm font-extrabold text-slate-600 tracking-widest cursor-pointer scale-active flex items-center gap-1 px-3 py-1 bg-white rounded-full shadow-sm">
                        <span id="calendar-title-year"></span>年 <span id="calendar-title-month"></span>月 <span class="text-[8px] text-slate-300 hide-in-shot">▼</span>
                    </h2>
                    <button onclick="window.app.jumpToToday()" class="text-[10px] bg-sky-50 text-sky-500 font-bold px-2 py-1 rounded-full scale-active hide-in-shot border border-sky-100">今日</button>
                </div>
                <button onclick="window.app.shiftMonth(1)" class="text-xs text-slate-400 font-bold scale-active hide-in-shot">Next ></button>
            </div>
            <div id="calendar-container" class="space-y-8"></div>
        </section>

        <section class="bg-white/80 backdrop-blur-sm rounded-3xl p-4 shadow-sm border border-white">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold text-slate-500">Events</h3>
            </div>
            <div id="daily-event-list" class="space-y-3"></div>
        </section>
    </main>

    <button id="fab-button" onclick="window.app.openEventModal()" class="fixed bottom-10 right-6 w-14 h-14 bg-slate-700 text-white rounded-full shadow-2xl flex items-center justify-center text-3xl font-bold z-40 scale-active hide-in-shot transition-all duration-400">
        <span class="mb-1">＋</span>
    </button>

    <div id="modal-layer" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-overlay">
        <div id="modal-content" class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl overflow-y-auto max-h-[90vh]"></div>
    </div>

    <script>
    (function() {
        const App = {
            appTitle: localStorage.getItem('oshi_title') || 'Oshikatsu',
            baseYear: 0, baseMonth: 0, selectedDateStr: '',
            activeOshiFilter: 'all', 
            oshis: JSON.parse(localStorage.getItem('oshi_list')) || [{ id: 'o1', name: '推し', color: '#7dd3fc', birthday: '' }],
            categories: JSON.parse(localStorage.getItem('cat_list')) || [{ id: 'c1', name: 'LIVE' }, { id: 'c2', name: 'チケット発売日' }, { id: 'c3', name: '当落発表' }],
            events: JSON.parse(localStorage.getItem('oshi_events')) || [],

            init: function() {
                const now = new Date();
                this.baseYear = now.getFullYear(); this.baseMonth = now.getMonth();
                this.selectedDateStr = this.safeDateStr(now);
                document.getElementById('app-title-text').textContent = this.appTitle;
                this.sortEvents(); this.applyTheme(); this.renderFilter(); this.renderCountdowns(); this.renderCalendar();
            },
            safeDateStr: function(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; },
            parseSafeDate: function(str) { if (!str) return null; const parts = str.split('-'); return new Date(parts[0], parts[1] - 1, parts[2]); },
            sortEvents: function() { this.events.sort((a, b) => { const aStart = this.parseSafeDate(a.startDate)?.getTime() || 0; const bStart = this.parseSafeDate(b.startDate)?.getTime() || 0; return aStart - bStart; }); },
            save: function() { this.sortEvents(); localStorage.setItem('oshi_list', JSON.stringify(this.oshis)); localStorage.setItem('cat_list', JSON.stringify(this.categories)); localStorage.setItem('oshi_events', JSON.stringify(this.events)); },
            editTitle: function() { const t = prompt('カレンダーの名前を入力してください', this.appTitle); if(t && t.trim() !== '') { this.appTitle = t.trim(); localStorage.setItem('oshi_title', this.appTitle); document.getElementById('app-title-text').textContent = this.appTitle; } },
            applyTheme: function() { let c = '#334155'; if (this.activeOshiFilter !== 'all') { const o = this.oshis.find(x => String(x.id) === String(this.activeOshiFilter)); if (o) c = o.color; } document.getElementById('app-body').style.backgroundColor = c + '1A'; document.getElementById('main-header').style.backgroundColor = c + '0D'; document.getElementById('fab-button').style.backgroundColor = c; },
            
            // --- 描画ロジック ---
            renderCalendar: function() {
                const cont = document.getElementById('calendar-container'); cont.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    let y = this.baseYear, m = this.baseMonth + i; if (m > 11) { m -= 12; y++; }
                    if (i === 0) { document.getElementById('calendar-title-year').textContent = y; document.getElementById('calendar-title-month').textContent = m + 1; }
                    
                    let html = `<div class="calendar-grid gap-x-1 text-[8px] text-slate-300 font-bold text-center uppercase mb-2 ${i>0 ? 'mt-8' : ''}">
                               <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>`;
                    
                    let weeks = []; let currentWeek = [];
                    const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
                    for (let k = 0; k < first; k++) currentWeek.push(null);
                    for (let d = 1; d <= last; d++) { currentWeek.push(d); if (currentWeek.length === 7) { weeks.push(currentWeek); currentWeek = []; } }
                    if (currentWeek.length > 0) { while (currentWeek.length < 7) currentWeek.push(null); weeks.push(currentWeek); }

                    html += `<div class="flex flex-col gap-2">`;
                    for (let w = 0; w < weeks.length; w++) {
                        html += `<div class="calendar-grid gap-x-1">`;
                        for (let wd = 0; wd < 7; wd++) {
                            const d = weeks[w][wd];
                            if (d === null) { html += `<div></div>`; }
                            else {
                                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                                const bdayOshis = this.oshis.filter(o => o.birthday && o.birthday.slice(5) === ds.slice(5) && (this.activeOshiFilter === 'all' || String(o.id) === String(this.activeOshiFilter)));
                                const isSel = ds === this.selectedDateStr;
                                
                                html += `<div class="p-1 min-h-[52px] rounded-2xl flex flex-col items-center cursor-pointer transition-all ${isSel ? 'bg-slate-700 text-white shadow-md' : 'hover:bg-white/50'}" onclick="window.app.selectDate('${ds}')">
                                         <span class="text-[11px] font-bold mb-0.5">${d}</span>
                                         <div class="uchiwa-container flex flex-col gap-0 items-center justify-center">
                                            ${bdayOshis.map(o => `<span class="uchiwa-text text-[9px] font-extrabold leading-[1.0]" style="color:#334155; text-shadow: 0.5px 0.5px 0 #fff, -0.5px -0.5px 0 #fff, 1px 1px 0 ${o.color};">${o.name}<br>HBD</span>`).join('')}
                                         </div>
                                         <div class="w-full mt-auto pt-1 flex flex-col gap-0.5">${this.renderIndicators(ds)}</div>
                                         </div>`;
                            }
                        }
                        html += `</div>`;
                    }
                    cont.innerHTML += `<div>${html}</div>`;
                }
                this.renderDailyEvents();
            },
            renderIndicators: function(ds) {
                const evs = this.getEventsForDay(ds);
                return evs.map(e => {
                    const o = this.oshis.find(x => String(x.id) === String(e.oshiId));
                    return `<div class="h-[8px] w-full rounded" style="background-color:${o?.color || '#cbd5e1'}"></div>`;
                }).join('');
            },
            
            // --- 共通 ---
            renderFilter: function() { const cont = document.getElementById('oshi-filter-container'); let html = `<button onclick="window.app.setFilter('all')" class="shrink-0 px-3 py-1.5 rounded-full text-[10px] font-bold ${this.activeOshiFilter === 'all' ? 'bg-slate-700 text-white' : 'bg-white text-slate-400 border'}">すべて</button>`; this.oshis.forEach(o => { const isActive = String(this.activeOshiFilter) === String(o.id); html += `<button onclick="window.app.setFilter('${o.id}')" class="shrink-0 px-3 py-1.5 rounded-full text-[10px] font-bold ${isActive ? 'text-white' : 'bg-white text-slate-400 border'}" style="${isActive ? `background-color:${o.color}` : ''}">${o.name}</button>`; }); cont.innerHTML = html; },
            setFilter: function(id) { this.activeOshiFilter = id; this.applyTheme(); this.renderFilter(); this.renderCountdowns(); this.renderCalendar(); },
            renderCountdowns: function() {
                const cont = document.getElementById('countdown-container'); const today = new Date(); today.setHours(0,0,0,0);
                const countdownEvs = this.events.filter(e => e.isCountdown && (this.activeOshiFilter === 'all' || String(e.oshiId) === String(this.activeOshiFilter))).sort((a,b) => this.parseSafeDate(a.startDate) - this.parseSafeDate(b.startDate));
                if(countdownEvs.length === 0) { cont.innerHTML = ''; return; }
                let html = `<div class="flex gap-2 overflow-x-auto pb-2 hide-in-shot px-1">`;
                countdownEvs.forEach(e => { const d = this.parseSafeDate(e.startDate); const diffDays = Math.ceil((d - today) / (1000 * 60 * 60 * 24)); html += `<div class="shrink-0 bg-white shadow-sm rounded-2xl py-2 px-3 flex items-center gap-2 cursor-pointer" onclick="window.app.selectDate('${e.startDate}')"><div class="text-[10px] font-bold">${e.name}まで</div><div class="text-sm font-extrabold text-sky-500">${diffDays}日</div></div>`; });
                cont.innerHTML = html + `</div>`;
            },
            renderDailyEvents: function() {
                const list = document.getElementById('daily-event-list');
                const evs = this.getEventsForDay(this.selectedDateStr);
                const bdays = this.oshis.filter(o => o.birthday && o.birthday.slice(5) === this.selectedDateStr.slice(5));
                document.getElementById('selected-date-title').textContent = this.selectedDateStr.replace(/-/g, '/');
                let html = bdays.map(o => `<div class="p-3 rounded-2xl border bg-pink-50 text-pink-700 font-bold text-sm">🎂 ${o.name} Birthday!</div>`).join('');
                html += evs.map(ev => `<div class="p-3 bg-white rounded-2xl border text-sm font-bold shadow-sm" onclick="window.app.openEventModal('${ev.id}')">${ev.name}</div>`).join('');
                list.innerHTML = html || '<div class="text-center text-slate-300 text-xs py-8">予定はありません</div>';
            },
            getEventsForDay: function(ds) { const curD = this.parseSafeDate(ds); return this.events.filter(e => { const s = this.parseSafeDate(e.startDate); const end = this.parseSafeDate(e.endDate || e.startDate); return curD >= s && curD <= end; }); },
            selectDate: function(ds) { this.selectedDateStr = ds; this.renderCalendar(); },
            openEventModal: function(id = null) {
                // (省略：modal code is consistent)
                this.showModal(`<h3 class="font-bold mb-4">予定を追加/編集</h3><form id="ev-form" class="space-y-3"><input type="text" id="ev-name" placeholder="タイトル" required class="w-full p-3 rounded-xl border font-bold"><input type="date" id="ev-start" class="w-full p-3 rounded-xl border font-bold"><select id="ev-oshi" class="w-full p-3 rounded-xl border font-bold">${this.oshis.map(o => `<option value="${o.id}">${o.name}</option>`).join('')}</select><label><input type="checkbox" id="ev-count"> カウントダウン</label><button type="submit" class="w-full bg-slate-700 text-white py-3 rounded-2xl">保存</button></form>`);
                document.getElementById('ev-form').onsubmit = (e) => { e.preventDefault(); const newEv = { id: id || 'ev'+Date.now(), name: document.getElementById('ev-name').value, startDate: document.getElementById('ev-start').value, oshiId: document.getElementById('ev-oshi').value, isCountdown: document.getElementById('ev-count').checked }; if(id) this.events = this.events.map(x=>x.id===id?newEv:x); else this.events.push(newEv); this.save(); this.closeModal(); this.renderCalendar(); this.renderCountdowns(); };
            },
            showModal: function(html) { const m = document.getElementById('modal-layer'); m.classList.remove('hidden'); document.getElementById('modal-content').innerHTML = html; },
            closeModal: function() { document.getElementById('modal-layer').classList.add('hidden'); },
            openOshiModal: function() { /* ... */ }, openConfigModal: function() { /* ... */ }, openSettingModal: function() { /* ... */ },
            shiftMonth: function(d) { this.baseMonth += d; if(this.baseMonth < 0) { this.baseMonth=11; this.baseYear--; } else if(this.baseMonth>11){ this.baseMonth=0; this.baseYear++; } this.renderCalendar(); },
            jumpToToday: function() { const n = new Date(); this.baseYear=n.getFullYear(); this.baseMonth=n.getMonth(); this.selectedDateStr=this.safeDateStr(n); this.renderCalendar(); },
            openMonthPicker: function() { this.showModal(`年月ジャンプ実装予定(今は戻るボタンで)`); },
            requestNotif: function() { alert('通知機能はブラウザ設定から有効にしてください'); },
            toggleScreenshotMode: function() { document.body.classList.toggle('shot-mode'); }
        };
        window.app = App; window.onload = () => App.init();
    })();
    </script>
</body>
</html>
