<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>oshikatsu calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; }
        ::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .scale-in { animation: scaleIn 0.2s ease-out; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-sky-50/50 text-slate-700 font-sans antialiased pb-24">

    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-sky-100 flex justify-between items-center">
        <h1 class="text-lg font-extrabold text-sky-600 tracking-tight">oshikatsu calendar</h1>
        <div class="flex gap-2">
            <button onclick="openOshiModal()" class="bg-sky-100 text-sky-600 border border-sky-200 text-xs font-bold py-2 px-3 rounded-2xl active:scale-95 transition-all">推し</button>
            <button onclick="openConfigModal()" class="bg-slate-100 text-slate-500 border border-slate-200 text-xs font-bold py-2 px-3 rounded-2xl active:scale-95 transition-all">項目</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <section class="bg-white rounded-3xl shadow-sm border border-sky-100 p-4">
            <div class="flex justify-between items-center mb-4 px-1">
                <button onclick="shiftMonth(-1)" class="text-xs text-sky-500 bg-sky-50 px-3 py-1.5 rounded-xl font-bold border border-sky-100 active:scale-95 transition-all">&lt; Back</button>
                <button onclick="shiftMonth(1)" class="text-xs text-sky-500 bg-sky-50 px-3 py-1.5 rounded-xl font-bold border border-sky-100 active:scale-95 transition-all">Next &gt;</button>
            </div>
            <div id="calendar-container" class="space-y-8"></div>
        </section>

        <section class="bg-white rounded-3xl shadow-sm border border-sky-100 p-4 sticky bottom-4 z-20">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold text-slate-600 leading-none">Events</h3>
                <button onclick="openEventModal()" class="bg-sky-300 text-white text-xs font-bold py-2 px-3 rounded-2xl shadow-sm shadow-sky-100 active:scale-95 transition-all">＋ Add</button>
            </div>
            <div id="daily-event-list" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
        </section>
    </main>

    <div id="event-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl scale-in">
            <h3 id="modal-title" class="text-base font-bold text-slate-700 mb-4">予定を登録</h3>
            <form id="event-form" class="space-y-3">
                <input type="hidden" id="event-id">
                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2">開始日</label>
                        <input type="date" id="event-start-date" required class="w-full bg-slate-50 border border-sky-50 p-3 rounded-2xl text-xs font-bold text-slate-700 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2">終了日（任意）</label>
                        <input type="date" id="event-end-date" class="w-full bg-slate-50 border border-sky-50 p-3 rounded-2xl text-xs font-bold text-slate-700 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2">開始時間</label>
                        <input type="time" id="event-start-time" class="w-full bg-slate-50 border border-sky-50 p-3 rounded-2xl text-xs font-bold text-slate-700 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2">終了時間</label>
                        <input type="time" id="event-end-time" class="w-full bg-slate-50 border border-sky-50 p-3 rounded-2xl text-xs font-bold text-slate-700 outline-none">
                    </div>
                </div>
                <select id="event-oshi" required class="w-full bg-slate-50 border border-sky-50 p-3 rounded-2xl text-sm font-bold text-slate-700 outline-none"></select>
                <select id="event-category" required class="w-full bg-slate-50 border border-sky-50 p-3 rounded-2xl text-sm font-bold text-slate-700 outline-none"></select>
                <input type="text" id="event-name" placeholder="タイトル" required class="w-full bg-slate-50 border border-sky-50 p-3 rounded-2xl text-sm text-slate-700 outline-none">
                
                <div class="flex gap-2 mt-4">
                    <button type="button" onclick="closeEventModal()" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-2xl text-sm font-bold active:scale-95 transition-all">戻る</button>
                    <button type="button" id="delete-event-btn" onclick="deleteEvent()" class="hidden flex-1 bg-rose-50 text-rose-400 py-3 rounded-2xl text-sm font-bold active:scale-95 transition-all">削除</button>
                    <button type="submit" class="flex-1 bg-sky-300 text-white py-3 rounded-2xl text-sm font-bold shadow-sm active:scale-95 transition-all">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div id="oshi-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl scale-in">
            <h3 class="text-base font-bold text-slate-700 mb-4 font-bold">推し設定</h3>
            <form id="oshi-form" class="space-y-3 mb-4">
                <input type="text" id="new-oshi-name" placeholder="推しの名前" required class="w-full bg-slate-50 border border-sky-50 p-3 rounded-2xl text-xs outline-none">
                <div class="flex items-center gap-2 bg-slate-50 border border-sky-50 p-2 rounded-2xl">
                    <span class="text-[10px] font-bold text-slate-400 ml-2">テーマカラー</span>
                    <input type="color" id="new-oshi-color" value="#7dd3fc" class="flex-1 h-8 border-none outline-none bg-transparent cursor-pointer rounded-lg overflow-hidden">
                </div>
                <button type="submit" class="w-full bg-sky-300 text-white font-bold py-3 rounded-2xl text-xs active:scale-95 transition-all">推しを追加</button>
            </form>
            <div id="oshi-list-container" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
            <button onclick="closeOshiModal()" class="w-full bg-slate-50 text-slate-500 font-bold py-3 rounded-2xl text-xs mt-4 transition-all">閉じる</button>
        </div>
    </div>

    <div id="config-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl scale-in">
            <h3 class="text-base font-bold text-slate-700 mb-4 font-bold">項目設定</h3>
            <form id="cat-form" class="space-y-3 mb-4">
                <input type="text" id="new-cat-name" placeholder="新しい項目名（例：ラジオ）" required class="w-full bg-slate-50 border border-sky-50 p-3 rounded-2xl text-xs outline-none">
                <button type="submit" class="w-full bg-slate-400 text-white font-bold py-3 rounded-2xl text-xs active:scale-95 transition-all">項目を追加</button>
            </form>
            <div id="cat-list-container" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
            <button onclick="closeConfigModal()" class="w-full bg-slate-50 text-slate-500 font-bold py-3 rounded-2xl text-xs mt-4 transition-all">閉じる</button>
        </div>
    </div>

    <script>
        // --- データの初期化 ---
        let baseYear, baseMonth, selectedDateStr;
        let oshis = JSON.parse(localStorage.getItem('oshi_list')) || [{ id: 'o1', name: '推し', color: '#7dd3fc' }];
        let categories = JSON.parse(localStorage.getItem('cat_list')) || [{ id: 'c1', name: 'LIVE' }, { id: 'c2', name: '当落発表' }];
        let events = JSON.parse(localStorage.getItem('oshi_events')) || [];

        window.onload = function() {
            const now = new Date();
            baseYear = now.getFullYear();
            baseMonth = now.getMonth();
            selectedDateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            renderCalendar();
        };

        // --- 共通ユーティリティ ---
        function formatDate(d) {
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function getEventsForDay(dateStr) {
            const d = new Date(dateStr.replace(/-/g, '/'));
            return events.filter(e => {
                const start = new Date(e.startDate.replace(/-/g, '/'));
                const end = new Date((e.endDate || e.startDate).replace(/-/g, '/'));
                return d >= start && d <= end;
            });
        }

        // --- カレンダー描画 ---
        function renderCalendar() {
            const container = document.getElementById('calendar-container'); 
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                let y = baseYear;
                let m = baseMonth + i;
                if(m > 11){ m -= 12; y++; }
                const first = new Date(y, m, 1).getDay();
                const last = new Date(y, m+1, 0).getDate();
                let html = `<h2 class="text-xs font-bold text-sky-400 mb-2 px-1">${y}年 ${m+1}月</h2>
                           <div class="calendar-grid mb-2 text-[8px] text-slate-300 font-bold text-center uppercase">
                           <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
                           <div class="calendar-grid gap-1">`;
                for(let k=0; k<first; k++) html += `<div></div>`;
                for(let d=1; d<=last; d++){
                    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const evs = getEventsForDay(ds);
                    const isSel = ds === selectedDateStr;
                    html += `<div class="p-1 min-h-[42px] rounded-2xl flex flex-col justify-center items-center text-xs font-extrabold cursor-pointer transition-all ${isSel ? 'bg-sky-200 text-white shadow-md' : 'text-slate-500 hover:bg-sky-50'}" onclick="selectDate('${ds}')">
                             ${d}
