<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oshikatsu Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; touch-action: manipulation; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    </style>
</head>
<body class="bg-sky-50 text-slate-700 pb-24">

    <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-sky-100 flex justify-between items-center">
        <h1 class="text-lg font-bold text-sky-600">Oshikatsu Pro</h1>
        <div class="flex gap-2">
            <button onclick="window.app.toggleFilter()" class="bg-slate-100 text-slate-600 text-xs font-bold py-2 px-3 rounded-2xl">Filter</button>
            <button onclick="window.app.openOshiModal()" class="bg-sky-100 text-sky-600 text-xs font-bold py-2 px-3 rounded-2xl">推し</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <section class="bg-white rounded-3xl p-4 shadow-sm">
            <div class="flex justify-between items-center mb-4 text-xs font-bold text-sky-500">
                <button onclick="window.app.shiftMonth(-1)">&lt; Back</button>
                <button onclick="window.app.jumpToToday()" class="underline">Today</button>
                <button onclick="window.app.shiftMonth(1)">Next &gt;</button>
            </div>
            <div id="calendar-container" class="space-y-6"></div>
        </section>

        <section class="bg-white rounded-3xl p-4 shadow-sm">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold">Events</h3>
                <button onclick="window.app.openEventModal()" class="bg-sky-400 text-white text-xs font-bold py-2 px-4 rounded-2xl">＋ Add</button>
            </div>
            <div id="daily-event-list" class="space-y-2"></div>
        </section>
        
        <div class="text-center"><button onclick="window.app.exportData()" class="text-[10px] text-slate-400 underline">データバックアップ</button></div>
    </main>

    <!-- モーダル定義 -->
    <div id="event-modal" class="fixed inset-0 bg-black/20 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl">
            <h3 id="modal-title" class="font-bold mb-4">予定を登録</h3>
            <form id="event-form" class="space-y-3">
                <input type="hidden" id="event-id">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="event-start-date" required class="bg-slate-50 p-2 rounded-xl text-xs">
                    <input type="date" id="event-end-date" class="bg-slate-50 p-2 rounded-xl text-xs">
                </div>
                <input type="text" id="event-name" placeholder="タイトル" required class="w-full bg-slate-50 p-3 rounded-xl text-sm">
                <input type="text" id="event-location" placeholder="場所(URL可)" class="w-full bg-slate-50 p-3 rounded-xl text-sm">
                <select id="event-oshi" class="w-full bg-slate-50 p-3 rounded-xl text-sm"></select>
                <select id="event-category" class="w-full bg-slate-50 p-3 rounded-xl text-sm"></select>
                <div class="flex gap-2">
                    <button type="button" onclick="window.app.closeEventModal()" class="flex-1 bg-slate-100 py-2 rounded-xl text-sm font-bold">戻る</button>
                    <button type="submit" class="flex-1 bg-sky-400 text-white py-2 rounded-xl text-sm font-bold">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 他モーダルは省略なしで実装可能 -->
    <script>
        (function() {
            const App = {
                init: function() {
                    this.oshis = JSON.parse(localStorage.getItem('oshi_list')) || [{id:'o1', name:'推し', color:'#7dd3fc', birthday:''}];
                    this.categories = JSON.parse(localStorage.getItem('cat_list')) || [{id:'c1', name:'LIVE'}, {id:'c2', name:'当落'}];
                    this.events = JSON.parse(localStorage.getItem('oshi_events')) || [];
                    this.renderCalendar();
                },
                renderCalendar: function() {
                    const container = document.getElementById('calendar-container'); container.innerHTML = '';
                    const now = new Date();
                    for (let i = 0; i < 3; i++) {
                        let y = now.getFullYear(), m = now.getMonth() + i;
                        if(m>11){m-=12; y++}
                        let html = `<h2 class="text-xs font-bold text-sky-400 mb-2">${y}年${m+1}月</h2><div class="calendar-grid text-[8px] text-slate-300 font-bold text-center"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div><div class="calendar-grid gap-1 mt-2">`;
                        for(let d=1; d<=new Date(y,m+1,0).getDate(); d++){
                            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                            html += `<div class="p-1 text-center rounded-xl cursor-pointer hover:bg-sky-100" onclick="window.app.selectDate('${ds}')">${d}</div>`;
                        }
                        container.innerHTML += `<div>${html}</div>`;
                    }
                },
                selectDate: function(ds) { this.selectedDate = ds; document.getElementById('selected-date-title').innerText = ds; this.renderDailyEvents(); },
                openEventModal: function(id=null) { 
                    document.getElementById('event-oshi').innerHTML = this.oshis.map(o=>`<option value="${o.id}">${o.name}</option>`).join('');
                    document.getElementById('event-category').innerHTML = this.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
                    document.getElementById('event-modal').classList.remove('hidden'); 
                },
                closeEventModal: function() { document.getElementById('event-modal').classList.add('hidden'); },
                renderDailyEvents: function() {
                    const list = document.getElementById('daily-event-list');
                    list.innerHTML = this.events.filter(e=>e.startDate === this.selectedDate).map(ev=>`<div class="p-3 bg-white border border-sky-100 rounded-2xl shadow-sm">${ev.name}</div>`).join('') || '予定なし';
                },
                exportData: function() { alert(JSON.stringify(this.events)); },
                shiftMonth: function(d) { }, jumpToToday: function() {}, openOshiModal: function() {}, openConfigModal: function() {}, toggleFilter: function() {}
            };
            window.app = App; App.init();
        })();
    </script>
</body>
</html>
