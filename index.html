<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Oshikatsu</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Zen+Kurenaido&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>body{font-family:'M PLUS Rounded 1c',sans-serif;touch-action:manipulation;transition:background-color .4s ease}::-webkit-scrollbar{display:none}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);width:100%}.modal-overlay{background:rgba(0,0,0,.3);backdrop-filter:blur(4px)}.scale-active:active{transform:scale(.96)}.shot-mode .hide-in-shot{display:none!important}.day-cell{position:relative;overflow:visible}.penlight-wrapper{transform-origin:bottom center;animation:float-pulse 2s infinite ease-in-out}@keyframes float-pulse{0%,100%{transform:scale(.96) translateY(0)}50%{transform:scale(1.04) translateY(-3px)}}.penlight-glow{position:absolute;top:25%;left:30%;width:40%;height:35%;border-radius:50%;filter:blur(8px);animation:glow-pulse 2s infinite ease-in-out}@keyframes glow-pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.8)}}</style></head><body id="app-body" class="bg-sky-50 text-slate-700 pb-24"><header id="main-header" class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-white/50 flex justify-between items-center"><h1 onclick="window.app.editTitle()" class="text-xl font-extrabold text-slate-700 cursor-pointer">📅 <span id="app-title-text"></span></h1><div class="flex gap-1.5"><button onclick="window.app.toggleScreenshotMode()" class="w-8 h-8 bg-white/80 rounded-full">📸</button><button onclick="window.app.openSettingModal()" class="w-8 h-8 bg-white/80 rounded-full">⚙️</button><button onclick="window.app.openMapModal()" class="w-8 h-8 bg-white/80 rounded-full">📍</button><button onclick="window.app.openAlbumModal()" class="w-8 h-8 bg-white/80 rounded-full">🩵</button></div></header><main class="p-4 max-w-md mx-auto space-y-4"><div id="countdown-container"></div><div class="flex items-center justify-between px-1 mb-1"><div id="oshi-filter-container" class="flex gap-2 overflow-x-auto flex-1 pb-1"></div><button onclick="window.app.openEventListModal()" class="shrink-0 bg-white text-sky-500 text-[10px] font-bold py-2 px-3 rounded-full ml-2 shadow-sm border border-sky-100">📋</button></div><section class="bg-white/80 backdrop-blur-sm rounded-3xl p-4 shadow-sm border border-white"><div class="flex justify-between items-center mb-4 px-1"><button onclick="window.app.shiftMonth(-1)" class="text-xs text-slate-400 font-bold">< Back</button><div class="flex items-center gap-2"><h2 onclick="window.app.openMonthPicker()" class="text-sm font-extrabold text-slate-600 px-3 py-1 bg-white rounded-full shadow-sm"><span id="calendar-title-year"></span>年 <span id="calendar-title-month"></span>月</h2><button onclick="window.app.jumpToToday()" class="text-[10px] bg-sky-50 text-sky-500 font-bold px-2 py-1 rounded-full border border-sky-100">今日</button></div><button onclick="window.app.shiftMonth(1)" class="text-xs text-slate-400 font-bold">Next ></button></div><div id="calendar-container" class="space-y-8"></div></section><section class="bg-white/80 backdrop-blur-sm rounded-3xl p-4 shadow-sm border border-white"><h3 id="selected-date-title" class="text-sm font-bold text-slate-500 mb-3">Events</h3><div id="daily-event-list" class="space-y-3"></div></section></main><button onclick="window.app.openEventModal()" class="fixed bottom-10 right-6 w-14 h-14 bg-slate-700 text-white rounded-full shadow-2xl flex items-center justify-center text-3xl font-bold z-40">＋</button><div id="modal-layer" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-overlay"><div id="modal-content" class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl overflow-y-auto max-h-[90vh]"></div></div><script>
(function(){const App={appTitle:localStorage.getItem('oshi_title')||'Oshikatsu',baseYear:0,baseMonth:0,selectedDateStr:'',activeOshiFilter:'all',oshis:JSON.parse(localStorage.getItem('oshi_list'))||[{id:'o1',name:'推し',color:'#7dd3fc',birthday:'',imagePos:50}],categories:JSON.parse(localStorage.getItem('cat_list'))||[{id:'c1',name:'LIVE'},{id:'c2',name:'チケット発売日'},{id:'c3',name:'当落発表'}],events:JSON.parse(localStorage.getItem('oshi_events'))||[],holidays:{},mapInstance:null,penlightSize:localStorage.getItem('pl_size')||40,penlightStroke:localStorage.getItem('pl_stroke')||2,init:function(){const now=new Date();this.baseYear=now.getFullYear();this.baseMonth=now.getMonth();this.selectedDateStr=this.safeDateStr(now);document.getElementById('app-title-text').textContent=this.appTitle;this.sortEvents();this.applyTheme();this.renderFilter();this.renderCountdowns();this.fetchHolidays();this.renderCalendar()},safeDateStr:function(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`},parseSafeDate:function(str){if(!str)return null;const parts=str.split('-');return new Date(parts[0],parts[1]-1,parts[2])},sortEvents:function(){this.events.sort((a,b)=>this.parseSafeDate(a.startDate)-this.parseSafeDate(b.startDate))},save:function(){this.sortEvents();localStorage.setItem('oshi_list',JSON.stringify(this.oshis));localStorage.setItem('cat_list',JSON.stringify(this.categories));localStorage.setItem('oshi_events',JSON.stringify(this.events));localStorage.setItem('pl_size',this.penlightSize);localStorage.setItem('pl_stroke',this.penlightStroke)},editTitle:function(){const t=prompt('名前',this.appTitle);if(t){this.appTitle=t;localStorage.setItem('oshi_title',t);document.getElementById('app-title-text').textContent=t}},applyTheme:function(){let bg='#f0f9ff',head='rgba(255,255,255,.9)',fab='#334155';if(this.activeOshiFilter!=='all'){const o=this.oshis.find(x=>x.id==this.activeOshiFilter);if(o){bg=o.color+'1A';head=o.color+'0D';fab=o.color}}document.getElementById('app-body').style.backgroundColor=bg;document.getElementById('main-header').style.backgroundColor=head;document.getElementById('fab-button').style.backgroundColor=fab},toggleScreenshotMode:function(){document.body.classList.add('shot-mode');setTimeout(()=>{alert('撮影モードON');document.body.classList.remove('shot-mode')},100)},renderFilter:function(){const cont=document.getElementById('oshi-filter-container');let html=`<button onclick="window.app.setFilter('all')" class="shrink-0 px-3 py-1.5 rounded-full text-[10px] font-bold ${this.activeOshiFilter==='all'?'bg-slate-700 text-white':'bg-white text-slate-400'}">すべて</button>`;this.oshis.forEach(o=>{const act=this.activeOshiFilter==o.id;html+=`<button onclick="window.app.setFilter('${o.id}')" class="shrink-0 px-3 py-1.5 rounded-full text-[10px] font-bold ${act?'text-white':'bg-white text-slate-400'}" style="${act?`background-color:${o.color}`:''}">${o.name}</button>`});cont.innerHTML=html},setFilter:function(id){this.activeOshiFilter=id;this.applyTheme();this.renderFilter();this.renderCountdowns();this.renderCalendar()},renderCountdowns:function(){const cont=document.getElementById('countdown-container');const today=new Date();today.setHours(0,0,0,0);const evs=this.events.filter(e=>e.isCountdown&&(this.activeOshiFilter=='all'||e.oshiId==this.activeOshiFilter)).sort((a,b)=>this.parseSafeDate(a.startDate)-this.parseSafeDate(b.startDate));if(evs.length==0){cont.innerHTML='';return}let html=`<div class="flex gap-2 overflow-x-auto pb-2 px-1">`;evs.forEach(e=>{const d=Math.ceil((this.parseSafeDate(e.startDate)-today)/86400000);const o=this.oshis.find(x=>x.id==e.oshiId);html+=`<div class="shrink-0 bg-white/90 rounded-2xl py-2 px-4 shadow-sm" onclick="window.app.selectDate('${e.startDate}')"><div class="text-[10px] text-slate-500">${e.name}まで</div><div class="text-sm font-extrabold" style="color:${o?.color||'#0ea5e9'}">${d<=0?'本日！🎉':`あと${d}日`}</div></div>`});html+=`</div>`;cont.innerHTML=html},renderCalendar:function(){const cont=document.getElementById('calendar-container');cont.innerHTML='';for(let i=0;i<3;i++){let y=this.baseYear,m=this.baseMonth+i;if(m>11){m-=12;y++}if(i==0){document.getElementById('calendar-title-year').textContent=y;document.getElementById('calendar-title-month').textContent=m+1}let weeks=[],cur=[],first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();for(let k=0;k<first;k++)cur.push(null);for(let d=1;d<=last;d++){cur.push(d);if(cur.length==7){weeks.push(cur);cur=[]}}if(cur.length>0){while(cur.length<7)cur.push(null);weeks.push(cur)}let html=`<div class="grid grid-cols-7 text-center text-[8px] font-bold text-slate-300 mb-2"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>`;weeks.forEach(w=>{html+=`<div class="grid grid-cols-7 gap-1">`;w.forEach(d=>{if(d===null)html+=`<div></div>`;else{const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;html+=`<div class="h-16 rounded-xl flex items-center justify-center ${ds==this.selectedDateStr?'bg-slate-700 text-white':'hover:bg-slate-100'}" onclick="window.app.selectDate('${ds}')">${d}</div>`}});html+=`</div>`});cont.innerHTML+=`<div class="mt-4">${html}</div>`}this.renderDailyEvents()},renderDailyEvents:function(){const list=document.getElementById('daily-event-list');const evs=this.getEventsForDay(this.selectedDateStr);document.getElementById('selected-date-title').textContent=this.selectedDateStr.replace(/-/g,'/');list.innerHTML=evs.length>0?evs.map(ev=>{const o=this.oshis.find(x=>x.id==ev.oshiId);return `<div class="p-3 bg-white rounded-2xl shadow-sm border-l-4" style="border-color:${o?.color||'#ddd'}" onclick="window.app.openEventModal('${ev.id}')"><div class="text-sm font-extrabold">${ev.name}</div><div class="text-[10px] text-slate-400">${ev.location||'場所未設定'}</div></div>`}).join(''):'<div class="text-center text-slate-300 text-xs py-8">予定なし</div>'},showModal:function(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-layer').classList.remove('hidden')},closeModal:function(){document.getElementById('modal-layer').classList.add('hidden')},openAlbumModal:function(){if(this.oshis.length==0)return alert('推し未登録');let html=`<div class="mb-4 text-center font-bold">📸 推し図鑑</div><div class="flex gap-4 overflow-x-auto snap-x snap-mandatory">`;this.oshis.forEach(o=>{const pos=o.imagePos||50;html+=`<div class="shrink-0 w-64 snap-center bg-white border border-slate-100 rounded-lg p-4"><div class="aspect-square bg-slate-100 rounded-md overflow-hidden mb-2">${o.image?`<img src="${o.image}" class="w-full h-full object-cover" style="object-position:${pos}% ${pos}%">`:'🩵'}</div><div class="text-3xl text-slate-700" style="font-family:'Zen Kurenaido',sans-serif">${o.nickname||o.name}</div>${o.favoriteWork?`<div class="mt-2 p-2 bg-slate-50 text-xs text-center border-l-4" style="border-color:${o.color}">${o.favoriteWork.replace(/\n/g,'<br>')}</div>`:''}</div>`});html+=`</div><button onclick="window.app.closeModal()" class="w-full mt-6 py-3 bg-slate-100 rounded-2xl text-xs">閉じる</button>`;this.showModal(html)},openMapModal:function(){this.showModal(`<h3 class="mb-4 font-bold">📍 推し活聖地マップ</h3><div id="map-container" class="w-full h-80 rounded-2xl z-10"></div><button onclick="window.app.closeModal()" class="w-full mt-4 py-3 bg-slate-100 rounded-2xl text-xs">閉じる</button>`);setTimeout(()=>this.initMap(),200)},initMap:function(){this.mapInstance=L.map('map-container').setView([35.5,137.5],5);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.mapInstance);const groups={};this.events.forEach(e=>{if(e.isMapPin&&e.lat&&e.lng){const key=`${e.lat.toFixed(4)}_${e.lng.toFixed(4)}`;if(!groups[key])groups[key]=[];groups[key].push(e)}});Object.values(groups).forEach(g=>{const color=this.oshis.find(x=>x.id==g[0].oshiId)?.color||'#3b82f6';const w=this.penlightSize,h=Math.round(w*1.35),sw=this.penlightStroke;const html=`<div class="penlight-wrapper relative" style="width:${w}px;height:${h}px;"><div class="penlight-glow" style="background:${color}"></div><svg width="${w}" height="${h}" viewBox="0 0 40 54" fill="none" style="filter:drop-shadow(0 3px 2px rgba(0,0,0,.3))"><path d="M20 28C20 23 6 16 6 9.5C6 4.5 10 2 14.5 2C17.5 2 19 3.5 20 5C21 3.5 22.5 2 25.5 2C30 2 34 4.5 34 9.5C34 16 20 23 20 28Z" fill="${color}" stroke="#ffffff" stroke-width="${sw}"/><rect x="16" y="27" width="8" height="3" fill="#cbd5e1"/><path d="M16.5 30L15.5 46C15.5 48 16.5 49 20 49C23.5 49 24.5 48 24.5 46L23.5 30H16.5Z" fill="#ffffff" stroke="#e2e8f0"/></svg></div>`;L.marker([g[0].lat,g[0].lng],{icon:L.divIcon({html,className:'',iconSize:[w,h],iconAnchor:[w/2,h*0.9]})}).addTo(this.mapInstance).bindPopup(`<div class="text-xs text-center font-bold">${g[0].location}</div>${g.map(e=>`<div class="text-[9px]">${e.name}</div>`).join('')}`)})},openEventModal:function(id=null){const ev=this.events.find(e=>e.id==id)||{name:'',startDate:this.selectedDateStr,oshiId:this.oshis[0].id,isMapPin:false,location:''};this.showModal(`<form id="ev-form" class="space-y-3"><input type="text" id="ev-name" value="${ev.name}" placeholder="タイトル" class="w-full bg-slate-50 p-3 rounded-xl text-sm" required><input type="date" id="ev-start" value="${ev.startDate}" class="w-full bg-slate-50 p-3 rounded-xl text-sm" required><label class="flex items-center gap-2"><input type="checkbox" id="ev-mappin" ${ev.isMapPin?'checked':''}>📍マップ</label><input type="text" id="ev-loc" value="${ev.location}" placeholder="場所" class="w-full bg-slate-50 p-3 rounded-xl text-sm"><button type="submit" class="w-full bg-slate-700 text-white py-3 rounded-2xl text-xs">保存</button></form>`);document.getElementById('ev-form').onsubmit=async(e)=>{e.preventDefault();const loc=document.getElementById('ev-loc').value;let lat=ev.lat,lng=ev.lng;if(document.getElementById('ev-mappin').checked&&loc){try{const res=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(loc));const d=await res.json();if(d.length>0){lat=parseFloat(d[0].lat);lng=parseFloat(d[0].lon)}}catch(err){}}this.events.push({...ev,name:document.getElementById('ev-name').value,startDate:document.getElementById('ev-start').value,isMapPin:document.getElementById('ev-mappin').checked,location:loc,lat,lng});this.save();this.closeModal();this.renderCalendar()}},openSettingModal:function(){/*...*/},openOshiModal:function(){/*...*/},selectDate:function(ds){this.selectedDateStr=ds;this.renderCalendar()},shiftMonth:function(dir){this.baseMonth+=dir;if(this.baseMonth<0){this.baseMonth=11;this.baseYear--}else if(this.baseMonth>11){this.baseMonth=0;this.baseYear++}this.renderCalendar()},jumpToToday:function(){const now=new Date();this.baseYear=now.getFullYear();this.baseMonth=now.getMonth();this.selectedDateStr=this.safeDateStr(now);this.renderCalendar()}};window.app=App;window.onload=()=>App.init();})();</script></body></html>
