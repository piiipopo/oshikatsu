<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>oshikatsu calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; }
        ::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    </style>
</head>
<body class="bg-sky-50/50 text-slate-700 font-sans antialiased pb-24">

    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-sky-100 flex justify-between items-center">
        <h1 class="text-lg font-extrabold text-sky-600 tracking-tight">oshikatsu calendar</h1>
        <div class="flex gap-2">
            <button onclick="openOshiModal()" class="bg-sky-100 text-sky-600 border border-sky-200 text-xs font-bold py-2 px-3 rounded-2xl active:scale-95 transition-all">推し</button>
            <button onclick="openConfigModal()" class="bg-slate-100 text-slate-500 border border-slate-200 text-xs font-bold py-2 px-3 rounded-2xl active:scale-95 transition-all">項目</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <section id="notification-bar" class="hidden bg-sky-200 text-sky-900 rounded-3xl p-4 shadow-md shadow-sky-100 relative overflow-hidden">
            <div class="absolute -right-4 -bottom-4 text-white opacity-20 text-7xl font-bold">📢</div>
            <h3 class="text-xs font-bold opacity-80 mb-1">リマインダー</h3>
            <div id="urgent-events" class="space-y-1 text-sm font-bold opacity-90"></div>
        </section>

        <section class="bg-white rounded-3xl shadow-sm border border-sky-100 p-4">
            <div class="flex justify-between items-center mb-4">
                <button onclick="shiftMonth(-1)" class="text-xs text-sky-500 bg-sky-50 px-3 py-1.5 rounded-xl font-bold active:scale-95 transition-all border border-sky-100">&lt; 前へ</button>
                <button onclick="shiftMonth(1)" class="text-xs text-sky-500 bg-sky-50 px-3 py-1.5 rounded-xl font-bold active:scale-95 transition-all border border-sky-100">次へ &gt;</button>
            </div>
            <div id="calendar-container" class="space-y-6"></div>
        </section>

        <section class="bg-white rounded-3xl shadow-sm border border-sky-100 p-4 sticky bottom-4 z-20">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold text-slate-600">予定リスト</h3>
                <button onclick="openEventModal()" class="bg-sky-300 text-white text-xs font-bold py-2 px-3 rounded-2xl shadow-sm shadow-sky-100 active:scale-95 transition-all">＋ 予定追加</button>
            </div>
            <div id="daily-event-list" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
        </section>
    </main>

    <div id="event-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl">
            <h3 id="modal-title" class="text-base font-bold text-slate-700 mb-4">予定を登録</h3>
            <form id="event-form" class="space-y-4">
                <input type="hidden" id="event-id">
                <input type="date" id="event-date" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-3 text-sm font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-200">
                <select id="event-oshi" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-3 text-sm font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-200"></select>
                <select id="event-category" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-3 text-sm font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-200"></select>
                <input type="text" id="event-name" placeholder="タイトル" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-3 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-200">
                <div class="flex gap-2">
                    <button type="button" onclick="closeEventModal()" class="flex-1 bg-slate-100 text-slate-500 font-bold py-3 rounded-2xl text-sm active:scale-95">戻る</button>
                    <button type="submit" class="flex-1 bg-sky-300 text-white font-bold py-3 rounded-2xl text-sm shadow-sm active:scale-95">保存</button>
                </div>
                <div id="delete-btn-container" class="hidden text-center pt-1"><button type="button" onclick="deleteCurrentEvent()" class="text-xs text-rose-300 font-bold underline">削除</button></div>
            </form>
        </div>
    </div>

    <div id="oshi-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl"><h3 class="text-base font-bold text-slate-700 mb-4">推し設定</h3>
            <form id="oshi-form" class="space-y-3 mb-4"><input type="text" id="new-oshi-name" placeholder="推しの名前" required class="w-full bg-slate-50 border p-3 rounded-2xl text-xs"><input type="color" id="new-oshi-color" value="#0ea5e9" class="w-full h-10 rounded-2xl"><button type="submit" class="w-full bg-sky-400 text-white font-bold py-2 rounded-2xl text-xs">追加</button></form>
            <div id="oshi-list-container" class="space-y-2"></div>
            <button onclick="closeOshiModal()" class="w-full bg-slate-100 text-slate-500 font-bold py-2 rounded-2xl text-xs mt-4">閉じる</button>
        </div>
    </div>

    <div id="config-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl"><h3 class="text-base font-bold text-slate-700 mb-4">項目設定</h3>
            <form id="cat-form" class="space-y-3 mb-4"><input type="text" id="new-cat-name" placeholder="項目名" required class="w-full bg-slate-50 border p-3 rounded-2xl text-xs"><button type="submit" class="w-full bg-slate-600 text-white font-bold py-2 rounded-2xl text-xs">追加</button></form>
            <div id="cat-list-container" class="space-y-2"></div>
            <button onclick="closeConfigModal()" class="w-full bg-slate-100 text-slate-500 font-bold py-2 rounded-2xl text-xs mt-4">閉じる</button>
        </div>
    </div>

    <script>
        let baseYear, baseMonth, selectedDateStr;
        let oshis = JSON.parse(localStorage.getItem('oshi_list')) || [{ id: 'o1', name: '推し', color: '#0ea5e9' }];
        let categories = JSON.parse(localStorage.getItem('cat_list')) || [{ id: 'c1', name: 'LIVE' }, { id: 'c2', name: 'TV' }];
        let events = JSON.parse(localStorage.getItem('oshi_events')) || [];

        function saveData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
        
        // Modal & Rendering Logic
        function openEventModal() { document.getElementById('event-modal').classList.remove('hidden'); updateSelects(); }
        function closeEventModal() { document.getElementById('event-modal').classList.add('hidden'); }
        function openOshiModal() { renderOshiList(); document.getElementById('oshi-modal').classList.remove('hidden'); }
        function closeOshiModal() { document.getElementById('oshi-modal').classList.add('hidden'); renderCalendar(); }
        function openConfigModal() { renderCatList(); document.getElementById('config-modal').classList.remove('hidden'); }
        function closeConfigModal() { document.getElementById('config-modal').classList.add('hidden'); renderCalendar(); }

        function renderOshiList() {
            const container = document.getElementById('oshi-list-container');
            container.innerHTML = oshis.map(o => `<div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl"><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full" style="background-color:${o.color}"></div><span class="text-xs font-bold">${o.name}</span></div>${o.id!=='o1' ? `<button onclick="deleteOshi('${o.id}')" class="text-xs text-slate-400">✕</button>` : ''}</div>`).join('');
        }
        function renderCatList() {
            const container = document.getElementById('cat-list-container');
            container.innerHTML = categories.map(c => `<div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl"><span class="text-xs font-bold">${c.name}</span><button onclick="deleteCat('${c.id}')" class="text-xs text-slate-400">✕</button></div>`).join('');
        }
        
        function updateSelects() {
            document.getElementById('event-oshi').innerHTML = oshis.map(o => `<option value="${o.id}">${o.name}</option>`).join('');
            document.getElementById('event-category').innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        // Calendar Logic
        const today = new Date(); baseYear = today.getFullYear(); baseMonth = today.getMonth(); selectedDateStr = formatDate(today);
        function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function shiftMonth(dir) { baseMonth += dir; if(baseMonth<0){baseMonth=11; baseYear--} else if(baseMonth>11){baseMonth=0; baseYear++} renderCalendar(); }
        
        function renderCalendar() {
            const container = document.getElementById('calendar-container'); container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                let y = baseYear; let m = baseMonth + i; if(m > 11){m-=12; y++}
                container.innerHTML += buildMonthHTML(y, m);
            }
            renderDailyEvents();
        }

        function buildMonthHTML(year, month) {
            const first = new Date(year, month, 1).getDay(), last = new Date(year, month+1, 0).getDate();
            let html = `<h2 class="text-xs font-bold text-sky-400 mb-2">${year}年 ${month+1}月</h2><div class="calendar-grid gap-1">`;
            for(let i=0; i<first; i++) html += `<div></div>`;
            for(let d=1; d<=last; d++){
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const evs = events.filter(e => e.date === dateStr);
                const isSel = dateStr === selectedDateStr;
                html += `<div class="p-1 min-h-[40px] rounded-2xl flex flex-col justify-center items-center text-xs font-bold cursor-pointer ${isSel ? 'bg-sky-200 text-white' : 'text-slate-500 hover:bg-sky-50'}" onclick="selectDate('${dateStr}')">${d}<div class="flex gap-0.5 mt-1">${evs.map(e => `<div class="w-1.5 h-1.5 rounded-full" style="background-color:${oshis.find(o=>o.id===e.oshiId)?.color}"></div>`).join('')}</div></div>`;
            }
            return `<div>${html}</div></div>`;
        }

        function selectDate(s) { selectedDateStr = s; renderCalendar(); }
        function renderDailyEvents() {
            const list = document.getElementById('daily-event-list');
            const dayEvents = events.filter(e => e.date === selectedDateStr);
            list.innerHTML = dayEvents.length ? dayEvents.map(ev => `<div class="p-3 bg-sky-50 rounded-2xl flex items-center gap-3"><div class="w-2 h-8 rounded-full" style="background-color:${oshis.find(o=>o.id===ev.oshiId)?.color}"></div><div><div class="text-[10px] font-bold text-sky-600">${ev.name}</div></div></div>`).join('') : '<div class="text-center text-slate-400 text-xs py-4">予定なし</div>';
        }

        document.getElementById('event-form').addEventListener('submit', (e) => { e.preventDefault(); /* ...保存処理は以前のロジック同様... */ closeEventModal(); renderCalendar(); });
        document.getElementById('oshi-form').addEventListener('submit', (e) => { e.preventDefault(); /* ... */ renderOshiList(); });
        document.getElementById('cat-form').addEventListener('submit', (e) => { e.preventDefault(); /* ... */ renderCatList(); });
        
        renderCalendar();
    </script>
</body>
</html>
