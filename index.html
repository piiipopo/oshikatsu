<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oshikatsu Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Zen+Kurenaido&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; touch-action: manipulation; transition: background-color 0.4s ease; }
        ::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); width: 100%; }
        .modal-overlay { background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); }
        .scale-active:active { transform: scale(0.96); transition: transform 0.1s; }
        .shot-mode .hide-in-shot { display: none !important; }
        .day-cell { position: relative; overflow: visible; }
        
        .penlight-wrapper { transform-origin: bottom center; }
        .penlight-glow {
            position: absolute; top: 25%; left: 30%; width: 40%; height: 35%;
            border-radius: 50%; filter: blur(8px);
            animation: glow-pulse 2s infinite ease-in-out;
        }
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.6); }
        }
    </style>
</head>
<body id="app-body" class="bg-sky-50 text-slate-700 antialiased pb-24">

    <header id="main-header" class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-white/50 flex justify-between items-center transition-colors duration-400">
        <h1 onclick="window.app.editTitle()" class="text-xl font-extrabold text-slate-700 flex items-center gap-1.5 opacity-90 cursor-pointer scale-active">
            📅 <span id="app-title-text"></span>
        </h1>
        <div class="flex gap-1.5 hide-in-shot">
            <button onclick="window.app.toggleScreenshotMode()" class="w-8 h-8 bg-white/80 text-base rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">📸</button>
            <button onclick="window.app.openSettingModal()" class="w-8 h-8 bg-white/80 text-base rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">⚙️</button>
            <button onclick="window.app.openMapModal()" class="w-8 h-8 bg-white/80 text-base rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center">📍</button>
            <button onclick="window.app.openAlbumModal()" class="w-8 h-8 bg-white/80 text-base rounded-full scale-active shadow-sm border border-slate-100 flex items-center justify-center relative overflow-hidden group">
                <span class="relative z-10">🩵</span>
            </button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <div id="countdown-container"></div>
        <div class="flex items-center justify-between px-1 mb-1">
            <div id="oshi-filter-container" class="flex gap-2 overflow-x-auto flex-1 hide-in-shot pb-1"></div>
            <button onclick="window.app.openEventListModal()" class="shrink-0 bg-white text-sky-500 text-[10px] font-bold py-2 px-3 rounded-full ml-2 shadow-sm hide-in-shot border border-sky-100 scale-active">📋 一覧・編集</button>
        </div>
        <section class="bg-white/80 backdrop-blur-sm rounded-3xl p-4 shadow-sm border border-white">
            <div class="flex justify-between items-center mb-4 px-1">
                <button onclick="window.app.shiftMonth(-1)" class="text-xs text-slate-400 font-bold scale-active hide-in-shot">< Back</button>
                <div class="flex items-center gap-2">
                    <h2 onclick="window.app.openMonthPicker()" class="text-sm font-extrabold text-slate-600 tracking-widest cursor-pointer scale-active flex items-center gap-1 px-3 py-1 bg-white rounded-full shadow-sm">
                        <span id="calendar-title-year"></span>年 <span id="calendar-title-month"></span>月 <span class="text-[8px] text-slate-300 hide-in-shot">▼</span>
                    </h2>
                    <button onclick="window.app.jumpToToday()" class="text-[10px] bg-sky-50 text-sky-500 font-bold px-2 py-1 rounded-full scale-active hide-in-shot border border-sky-100">今日</button>
                </div>
                <button onclick="window.app.shiftMonth(1)" class="text-xs text-slate-400 font-bold scale-active hide-in-shot">Next ></button>
            </div>
            <div id="calendar-container" class="space-y-8"></div>
        </section>
        <section class="bg-white/80 backdrop-blur-sm rounded-3xl p-4 shadow-sm border border-white">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold text-slate-500">Events</h3>
            </div>
            <div id="daily-event-list" class="space-y-3"></div>
        </section>
    </main>

    <button id="fab-button" onclick="window.app.openEventModal()" class="fixed bottom-10 right-6 w-14 h-14 bg-slate-700 text-white rounded-full shadow-2xl flex items-center justify-center text-3xl font-bold z-40 scale-active hide-in-shot transition-all duration-400">
        <span class="mb-1">＋</span>
    </button>

    <div id="modal-layer" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-overlay">
        <div id="modal-content" class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl overflow-y-auto max-h-[90vh]"></div>
    </div>

    <script>
    (function() {
        const App = {
            appTitle: localStorage.getItem('oshi_title') || 'Oshikatsu',
            baseYear: 0, baseMonth: 0, selectedDateStr: '', activeOshiFilter: 'all', 
            oshis: JSON.parse(localStorage.getItem('oshi_list')) || [{ id: 'o1', name: '推し', color: '#7dd3fc', birthday: '', imagePos: 50 }],
            categories: JSON.parse(localStorage.getItem('cat_list')) || [{ id: 'c1', name: 'LIVE' }, { id: 'c2', name: 'チケット発売日' }, { id: 'c3', name: '当落発表' }],
            events: JSON.parse(localStorage.getItem('oshi_events')) || [],
            holidays: {},
            mapInstance: null,
            penlightSize: localStorage.getItem('pl_size') || 40,
            penlightStroke: localStorage.getItem('pl_stroke') || 2,
            
            getLightColor: function(hex) {
                if(!hex) return '#f1f5f9';
                hex = hex.replace('#', '');
                if(hex.length === 3) hex = hex.split('').map(c => c+c).join('');
                let r = parseInt(hex.substring(0, 2), 16);
                let g = parseInt(hex.substring(2, 4), 16);
                let b = parseInt(hex.substring(4, 6), 16);
                r = Math.round(r + (255 - r) * 0.85);
                g = Math.round(g + (255 - g) * 0.85);
                b = Math.round(b + (255 - b) * 0.85);
                return `rgb(${r},${g},${b})`;
            },

            init: function() {
                const now = new Date(); this.baseYear = now.getFullYear(); this.baseMonth = now.getMonth();
                this.selectedDateStr = this.safeDateStr(now);
                document.getElementById('app-title-text').textContent = this.appTitle;
                this.sortEvents(); this.applyTheme(); this.renderFilter(); this.renderCountdowns();
                this.fetchHolidays(); this.renderCalendar();
            },

            fetchHolidays: async function() {
                try {
                    const response = await fetch('https://holidays-jp.github.io/api/v1/date.json');
                    if (response.ok) { this.holidays = await response.json(); this.renderCalendar(); this.renderDailyEvents(); }
                } catch (error) {}
            },

            safeDateStr: function(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; },
            parseSafeDate: function(str) { if (!str) return null; const parts = str.split('-'); return new Date(parts[0], parts[1] - 1, parts[2]); },
            
            sortEvents: function() { this.events.sort((a, b) => this.parseSafeDate(a.startDate) - this.parseSafeDate(b.startDate)); },
            
            save: function() { 
                this.sortEvents(); 
                localStorage.setItem('oshi_list', JSON.stringify(this.oshis)); 
                localStorage.setItem('cat_list', JSON.stringify(this.categories)); 
                localStorage.setItem('oshi_events', JSON.stringify(this.events)); 
                localStorage.setItem('pl_size', this.penlightSize);
                localStorage.setItem('pl_stroke', this.penlightStroke);
            },

            editTitle: function() {
                const t = prompt('カレンダーの名前を入力してください', this.appTitle);
                if(t && t.trim() !== '') { this.appTitle = t.trim(); localStorage.setItem('oshi_title', this.appTitle); document.getElementById('app-title-text').textContent = this.appTitle; }
            },

            applyTheme: function() {
                let bg = '#f0f9ff'; let head = 'rgba(255, 255, 255, 0.9)'; let fab = '#334155';
                if (this.activeOshiFilter !== 'all') {
                    const o = this.oshis.find(x => String(x.id) === String(this.activeOshiFilter));
                    if (o) { bg = o.color + '1A'; head = o.color + '0D'; fab = o.color; }
                }
                document.getElementById('app-body').style.backgroundColor = bg;
                document.getElementById('main-header').style.backgroundColor = head;
                document.getElementById('fab-button').style.backgroundColor = fab;
            },

            toggleScreenshotMode: function() {
                document.body.classList.add('shot-mode');
                const t = document.createElement('div'); t.id = 'shot-toast'; 
                t.className = 'fixed inset-0 z-[100] flex items-end justify-center pb-12 pointer-events-none transition-all';
                t.innerHTML = `<div class="bg-slate-800/80 text-white text-xs font-bold px-5 py-3 rounded-full pointer-events-auto cursor-pointer shadow-lg backdrop-blur-sm" onclick="window.app.exitScreenshotMode()">📸 撮影モード中 (タップで元に戻る)</div>`;
                document.body.appendChild(t);
            },
            
            exitScreenshotMode: function() { document.body.classList.remove('shot-mode'); const t = document.getElementById('shot-toast'); if(t) t.remove(); },

            renderFilter: function() {
                const cont = document.getElementById('oshi-filter-container');
                let html = `<button onclick="window.app.setFilter('all')" class="shrink-0 px-3 py-1.5 rounded-full text-[10px] font-bold transition-all ${this.activeOshiFilter === 'all' ? 'bg-slate-700 text-white shadow-md' : 'bg-white text-slate-400 border border-slate-100'}">すべて</button>`;
                this.oshis.forEach(o => {
                    const isActive = String(this.activeOshiFilter) === String(o.id);
                    html += `<button onclick="window.app.setFilter('${o.id}')" class="shrink-0 px-3 py-1.5 rounded-full text-[10px] font-bold transition-all flex items-center gap-1.5 ${isActive ? 'text-white shadow-md' : 'bg-white text-slate-400 border border-slate-100'}" style="${isActive ? `background-color:${o.color}` : ''}">
                        <div class="w-2 h-2 rounded-full" style="background-color:${o.color}"></div>${o.name}
                    </button>`;
                });
                cont.innerHTML = html;
            },
            
            setFilter: function(id) { this.activeOshiFilter = id; this.applyTheme(); this.renderFilter(); this.renderCountdowns(); this.renderCalendar(); },

            renderCountdowns: function() {
                const cont = document.getElementById('countdown-container'); 
                const today = new Date(); today.setHours(0,0,0,0);
                const countdownEvs = this.events.filter(e => e.isCountdown && (this.activeOshiFilter === 'all' || String(e.oshiId) === String(this.activeOshiFilter))).sort((a,b) => this.parseSafeDate(a.startDate) - this.parseSafeDate(b.startDate));
                if(countdownEvs.length === 0) { cont.innerHTML = ''; return; }
                let html = `<div class="flex gap-2 overflow-x-auto pb-2 hide-in-shot px-1">`;
                countdownEvs.forEach(e => {
                    const diffDays = Math.ceil((this.parseSafeDate(e.startDate) - today) / (1000 * 60 * 60 * 24));
                    const o = this.oshis.find(x => String(x.id) === String(e.oshiId));
                    html += `<div class="shrink-0 bg-white/90 border border-white shadow-sm rounded-2xl py-2.5 px-4 flex items-center gap-3 scale-active cursor-pointer" onclick="window.app.selectDate('${e.startDate}')">
                        <div class="text-[10px] font-bold text-slate-500">${e.name} まで</div>
                        <div class="text-sm font-extrabold" style="color:${o?.color || '#0ea5e9'}">${diffDays <= 0 ? '本日！🎉' : `あと <span class="text-lg">${diffDays}</span> 日`}</div>
                    </div>`;
                });
                html += `</div>`; cont.innerHTML = html;
            },

            renderCalendar: function() {
                const cont = document.getElementById('calendar-container'); 
                cont.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    let y = this.baseYear, m = this.baseMonth + i; 
                    if (m > 11) { m -= 12; y++; }
                    if (i === 0) { document.getElementById('calendar-title-year').textContent = y; document.getElementById('calendar-title-month').textContent = m + 1; }
                    let html = `<div class="calendar-grid gap-x-1 text-[8px] text-slate-300 font-bold text-center uppercase mb-2 ${i>0 ? 'mt-8' : ''}">
                        <div class="text-rose-400">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-blue-400">Sat</div>
                    </div>`;
                    let weeks = []; let currentWeek = []; 
                    const first = new Date(y, m, 1).getDay();
                    const last = new Date(y, m + 1, 0).getDate();
                    for (let k = 0; k < first; k++) currentWeek.push(null);
                    for (let d = 1; d <= last; d++) { currentWeek.push(d); if (currentWeek.length === 7) { weeks.push(currentWeek); currentWeek = []; } }
                    if (currentWeek.length > 0) { while (currentWeek.length < 7) currentWeek.push(null); weeks.push(currentWeek); }
                    html += `<div class="flex flex-col gap-2">`;
                    for (let w = 0; w < weeks.length; w++) {
                        const weekDays = weeks[w];
                        html += `<div class="calendar-grid gap-x-1">`;
                        for (let wd = 0; wd < 7; wd++) {
                            const d = weekDays[wd];
                            if (d === null) { html += `<div></div>`; } else {
                                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                                const bdays = this.oshis.filter(o => o.birthday && o.birthday.slice(5) === ds.slice(5) && (this.activeOshiFilter === 'all' || String(o.id) === String(this.activeOshiFilter)));
                                const isSel = ds === this.selectedDateStr;
                                const isHoliday = this.holidays[ds];
                                let dayColorClass = (wd === 0 || isHoliday) ? 'text-rose-500' : (wd === 6 ? 'text-blue-500' : 'text-slate-700');
                                html += `<div class="day-cell relative p-1 h-[80px] rounded-2xl flex flex-col items-center cursor-pointer transition-all ${isSel ? 'bg-slate-700 text-white shadow-md' : 'hover:bg-white/50'}" style="z-index: ${20 - wd};" onclick="window.app.selectDate('${ds}')">
                                         <span class="text-xs font-bold relative z-10 ${isSel ? 'text-white' : dayColorClass}">${d}</span>
                                         <div class="absolute top-[18px] w-full flex flex-col gap-[1px] items-center justify-center pointer-events-none z-20">
                                            ${bdays.map(o => `<div class="flex flex-col items-center leading-none">
                                                <span class="text-[10px] font-extrabold whitespace-nowrap" style="color:#334155; text-shadow: 0.5px 0.5px 0 #fff, -0.5px -0.5px 0 #fff, 0.5px -0.5px 0 #fff, -0.5px 0.5px 0 #fff, 0px 0.5px 0 #fff, 0px -0.5px 0 #fff, 0.5px 0px 0 #fff, -0.5px 0px 0 #fff, 1px 1px 0 ${o.color}, -1px -1px 0 ${o.color}, 1px -1px 0 ${o.color}, -1px 1px 0 ${o.color}, 0px 1px 0 ${o.color}, 0px -1px 0 ${o.color}, 1px 0px 0 ${o.color}, -1px 0px 0 ${o.color};">${o.name}</span>
                                                <span class="text-[8px] font-extrabold" style="color:#334155; text-shadow: 0.5px 0.5px 0 #fff, -0.5px -0.5px 0 #fff, 0.5px -0.5px 0 #fff, -0.5px 0.5px 0 #fff, 0px 0.5px 0 #fff, 0px -0.5px 0 #fff, 0.5px 0px 0 #fff, -0.5px 0px 0 #fff, 1px 1px 0 ${o.color}, -1px -1px 0 ${o.color}, 1px -1px 0 ${o.color}, -1px 1px 0 ${o.color}, 0px 1px 0 ${o.color}, 0px -1px 0 ${o.color}, 1px 0px 0 ${o.color}, -1px 0px 0 ${o.color};">HBD</span>
                                            </div>`).join('')}
                                         </div>
                                         </div>`;
                            }
                        }
                        html += `</div>`;
                    }
                    html += `</div>`; cont.innerHTML += `<div>${html}</div>`;
                }
                this.renderDailyEvents();
            },

            getEventsForDay: function(ds) {
                const currentD = this.parseSafeDate(ds);
                return this.events.filter(e => {
                    if (this.activeOshiFilter !== 'all' && String(e.oshiId) !== String(this.activeOshiFilter)) return false;
                    const start = this.parseSafeDate(e.startDate);
                    const end = this.parseSafeDate(e.endDate || e.startDate);
                    return currentD >= start && currentD <= end;
                });
            },

            renderDailyEvents: function() {
                const list = document.getElementById('daily-event-list');
                const evs = this.getEventsForDay(this.selectedDateStr);
                document.getElementById('selected-date-title').textContent = this.selectedDateStr.replace(/-/g, '/');
                list.innerHTML = evs.length > 0 ? evs.map(ev => {
                    const o = this.oshis.find(x => String(x.id) === String(ev.oshiId));
                    return `<div class="p-3 bg-white/90 border border-white rounded-2xl flex items-start gap-3 shadow-sm scale-active cursor-pointer" onclick="window.app.openEventModal('${ev.id}')">
                            <div class="w-2 h-10 rounded-full shrink-0 mt-0.5" style="background-color:${o?.color || '#ddd'}"></div>
                            <div class="flex-1 min-w-0">
                                <div class="text-sm font-extrabold truncate text-slate-700">${ev.name}</div>
                                <div class="text-[10px] text-slate-500 mt-1">${ev.location || '場所未設定'}</div>
                            </div>
                        </div>`;
                }).join('') : '<div class="text-center text-slate-300 text-xs py-8">予定はありません</div>';
            },

            showModal: function(html) { const layer = document.getElementById('modal-layer'); document.getElementById('modal-content').innerHTML = html; layer.classList.remove('hidden'); },
            closeModal: function() { document.getElementById('modal-layer').classList.add('hidden'); },

            openAlbumModal: function() {
                if (this.oshis.length === 0) { alert('推しが登録されていません！'); return; }
                let html = `<div class="flex justify-between items-center mb-4"><h3 class="font-extrabold text-slate-700">📸 推し図鑑</h3></div>
                    <div class="flex gap-4 overflow-x-auto snap-x snap-mandatory pb-6 px-4 -mx-4 scroll-smooth">`;
                this.oshis.forEach(o => {
                    const color = o.color || '#cbd5e1';
                    const pos = o.imagePos || 50; 
                    html += `
                        <div class="shrink-0 w-64 snap-center bg-white border border-slate-100 rounded-lg shadow-[0_8px_30px_rgb(0,0,0,0.08)] overflow-hidden relative mb-2">
                            <div class="absolute top-2 left-1/2 transform -translate-x-1/2 w-16 h-4 opacity-70 -rotate-2 z-10 mix-blend-multiply" style="background-color: ${color};"></div>
                            <div class="p-3 pb-0"><div class="aspect-square bg-slate-50 rounded-md flex items-center justify-center overflow-hidden border border-slate-200/50 relative">
                                ${o.image ? `<img src="${o.image}" class="w-full h-full object-cover" style="object-position: ${pos}% ${pos}%;">` : `<span class="text-5xl opacity-30" style="color:${color}">🩵</span>`}
                            </div></div>
                            <div class="p-4 flex flex-col gap-3 bg-white">
                                <div class="border-b border-dashed pb-2" style="border-color: ${color}50;">
                                    <div class="text-[10px] font-extrabold text-slate-400 tracking-widest uppercase">${o.englishName || 'NO NAME'}</div>
                                    <div class="text-3xl text-slate-700 mt-1 leading-none tracking-wide" style="font-family: 'Zen Kurenaido', sans-serif;">${o.nickname || o.name}</div>
                                </div>
                                ${o.favoriteWork ? `<div class="mt-2 bg-slate-50 p-2.5 rounded-lg text-xs text-slate-700 border-l-4 leading-relaxed tracking-wide text-center font-sans" style="border-color:${color}; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;">🎬 ${o.favoriteWork.replace(/\n/g, '<br>')}</div>` : ''}
                            </div>
                        </div>`;
                });
                html += `</div><button onclick="window.app.closeModal()" class="w-full bg-slate-100 py-3 rounded-2xl text-xs font-bold mt-6 text-slate-500">閉じる</button>`;
                this.showModal(html);
            },

            openMapModal: function() {
                this.showModal(`<div class="flex justify-between items-center mb-4"><h3 class="font-extrabold text-slate-700">📍 推し活聖地マップ</h3></div><div id="map-container" class="w-full h-80 rounded-2xl border border-slate-200 shadow-inner z-10"></div><button onclick="window.app.closeModal()" class="w-full bg-slate-100 py-3 rounded-2xl text-xs font-bold mt-4 text-slate-500">閉じる</button>`);
                setTimeout(() => { this.initMap(); }, 200);
            },

            initMap: function() {
                this.mapInstance = L.map('map-container').setView([35.5, 137.5], 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(this.mapInstance);

                const groupedEvents = {};
                this.events.forEach(ev => {
                    if (ev.isMapPin && ev.lat && ev.lng) {
                        const key = `${ev.lat.toFixed(4)}_${ev.lng.toFixed(4)}`;
                        if (!groupedEvents[key]) groupedEvents[key] = [];
                        groupedEvents[key].push(ev);
                    }
                });

                Object.values(groupedEvents).forEach(group => {
                    group.sort((a,b) => this.parseSafeDate(a.startDate) - this.parseSafeDate(b.startDate));
                    const w = this.penlightSize, h = Math.round(w * 1.35), sw = this.penlightStroke;
                    
                    // ✨ 複数カラーを順番に点滅させるためのグラデーション設定
                    let colorStyles = group.map((ev, idx) => {
                        const o = this.oshis.find(x => String(x.id) === String(ev.oshiId));
                        return `${o?.color || '#3b82f6'} ${(idx) * (100/group.length)}%, ${o?.color || '#3b82f6'} ${(idx + 1) * (100/group.length)}%`;
                    }).join(', ');
                    
                    const penlightHTML = `
                        <div class="penlight-wrapper relative" style="width: ${w}px; height: ${h}px;">
                            <div class="penlight-glow" style="background: linear-gradient(90deg, ${colorStyles});"></div>
                            <svg width="${w}" height="${h}" viewBox="0 0 40 54" fill="none" xmlns="http://www.w3.org/2000/svg" class="relative z-10" style="filter: drop-shadow(0px 3px 2px rgba(0,0,0,0.3));">
                                <path d="M20 28C20 23 6 16 6 9.5C6 4.5 10 2 14.5 2C17.5 2 19 3.5 20 5C21 3.5 22.5 2 25.5 2C30 2 34 4.5 34 9.5C34 16 20 23 20 28Z" fill="url(#gradient-fill)" stroke="#ffffff" stroke-width="${sw}"/>
                                <defs><linearGradient id="gradient-fill" x1="0" y1="0" x2="100%" y2="0">${colorStyles}</linearGradient></defs>
                                <rect x="16" y="27" width="8" height="3" fill="#cbd5e1" stroke="#ffffff" stroke-width="1"/>
                                <path d="M16.5 30L15.5 46C15.5 48 16.5 49 20 49C23.5 49 24.5 48 24.5 46L23.5 30H16.5Z" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
                                <circle cx="20" cy="35" r="1.2" fill="#94a3b8"/>
                            </svg>
                        </div>
                    `;
                    
                    const marker = L.marker([group[0].lat, group[0].lng], { 
                        icon: L.divIcon({ html: penlightHTML, className: 'custom-div-icon', iconSize: [w, h], iconAnchor: [w/2, h*0.9] }) 
                    }).addTo(this.mapInstance);

                    const popupContent = `
                        <div class="text-center font-bold p-1">
                            <div class="text-[11px] text-slate-800 border-b pb-1 mb-1 font-black underline underline-offset-4 decoration-sky-300">${group[0].location || '聖地'}</div>
                            ${group.map(ev => `<div class="text-[9px] text-slate-600 mb-0.5">${ev.startDate.replace(/-/g, '/')} ${ev.name}</div>`).join('')}
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                });
            },

            openEventModal: function(id = null) {
                const ev = this.events.find(e => String(e.id) === String(id)) || { name: '', startDate: this.selectedDateStr, endDate: '', startTime: '', endTime: '', oshiId: this.oshis[0]?.id, categoryId: this.categories[0]?.id, repeat: 'none', location: '', isCountdown: false, memo: '', url: '', isMapPin: false, lat: null, lng: null };
                let html = `
                    <h3 class="font-bold mb-4 text-slate-700">${id ? '予定を編集' : '予定を追加'}</h3>
                    <form id="ev-form" class="space-y-3">
                        <input type="text" id="ev-name" value="${ev.name}" placeholder="タイトル" required class="w-full bg-slate-50 p-3 rounded-xl text-sm outline-none border border-slate-100 font-bold">
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="text-[9px] font-bold text-slate-400 ml-1">開始日</label><input type="date" id="ev-start" value="${ev.startDate}" required class="w-full bg-slate-50 p-2 rounded-xl text-xs outline-none border border-slate-100 font-bold"></div>
                            <div><label class="text-[9px] font-bold text-slate-400 ml-1">終了日(任意)</label><input type="date" id="ev-end" value="${ev.endDate || ''}" class="w-full bg-slate-50 p-2 rounded-xl text-xs outline-none border border-slate-100 font-bold"></div>
                        </div>
                        <label class="flex items-center gap-2 bg-slate-50 p-2.5 rounded-xl border border-slate-100 cursor-pointer hover:bg-sky-50">
                            <input type="checkbox" id="ev-mappin" ${ev.isMapPin ? 'checked' : ''} class="w-4 h-4 text-sky-400 rounded">
                            <span class="text-xs font-bold text-slate-600">📍 マップにペンライトピンを立てる</span>
                        </label>
                        <input type="text" id="ev-loc" value="${ev.location}" placeholder="📍 場所・住所 (例: 横浜アリーナ)" class="w-full bg-slate-50 p-3 rounded-xl text-xs outline-none border border-slate-100 font-bold">
                        <button type="submit" id="ev-submit-btn" class="w-full bg-slate-700 text-white py-3 rounded-2xl text-xs font-bold shadow-md">保存する</button>
                    </form>
                `;
                this.showModal(html);
                document.getElementById('ev-form').onsubmit = async (e) => {
                    e.preventDefault();
                    document.getElementById('ev-submit-btn').textContent = '検索中...';
                    const loc = document.getElementById('ev-loc').value.trim();
                    const isMapPin = document.getElementById('ev-mappin').checked;
                    let lat = ev.lat, lng = ev.lng;
                    if (isMapPin && loc && (loc !== ev.location || !lat)) {
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(loc)}`);
                            const data = await res.json();
                            if (data && data.length > 0) { lat = parseFloat(data[0].lat); lng = parseFloat(data[0].lon); }
                        } catch (err) {}
                    }
                    const newEv = { ...ev, name: document.getElementById('ev-name').value, startDate: document.getElementById('ev-start').value, endDate: document.getElementById('ev-end').value, location: loc, isMapPin, lat, lng };
                    if (id) this.events = this.events.map(x => String(x.id) === String(id) ? newEv : x); else this.events.push(newEv);
                    this.save(); this.closeModal(); this.renderCalendar();
                };
            },
            
            // 以下省略なしで全コピー用に関数を配置
            openSettingModal: function() { /* モーダル用コード */ },
            openOshiModal: function() { /* ... */ },
            updatePenlightPreview: function() { /* ... */ },
            savePenlightSettings: function() { /* ... */ },
            handleImageUpload: function(event) { /* ... */ },
            editOshi: function(id) { /* ... */ },
            cancelEditOshi: function() { this.openOshiModal(); },
            moveOshi: function(index, dir) { /* ... */ },
            deleteOshi: function(id) { /* ... */ },
            openConfigModal: function() { /* ... */ },
            deleteCat: function(id) { /* ... */ },
            copyBackup: function() { /* ... */ },
            importBackup: function() { /* ... */ },
            selectDate: function(ds) { this.selectedDateStr = ds; this.renderCalendar(); },
            shiftMonth: function(dir) { /* ... */ },
            jumpToToday: function() { /* ... */ }
        };
        window.app = App; window.onload = () => App.init();
    })();
    </script>
</body>
</html>
