<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oshikatsu Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi&family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kosugi', sans-serif; touch-action: manipulation; }
        ::-webkit-scrollbar { display: none; }
        .calendar-grid { font-family: 'M PLUS Rounded 1c', sans-serif; display: grid; grid-template-columns: repeat(7, 1fr); }
        .modal-overlay { background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); }
        .scale-active:active { transform: scale(0.96); transition: transform 0.1s; }
    </style>
</head>
<body class="bg-sky-50 text-slate-700 antialiased pb-24">

    <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-sky-100 flex justify-between items-center">
        <h1 class="text-lg font-bold text-sky-600 flex items-center gap-1.5">Oshikatsu</h1>
        <div class="flex gap-1.5">
            <button onclick="window.app.requestNotif()" class="bg-slate-50 text-slate-500 text-[10px] font-bold py-2 px-2.5 rounded-xl scale-active shadow-sm border border-slate-100">🔔</button>
            <button onclick="window.app.openSettingModal()" class="bg-slate-50 text-slate-500 text-[10px] font-bold py-2 px-2.5 rounded-xl scale-active shadow-sm border border-slate-100">⚙️</button>
            <button onclick="window.app.openConfigModal()" class="bg-sky-100 text-sky-600 text-[10px] font-bold py-2 px-2.5 rounded-xl scale-active shadow-sm">🏷️</button>
            <button onclick="window.app.openOshiModal()" class="bg-sky-100 text-sky-600 text-[10px] font-bold py-2 px-2.5 rounded-xl scale-active shadow-sm">🩵</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <section class="bg-white rounded-3xl p-4 shadow-sm border border-sky-50">
            <div class="flex justify-between items-center mb-4 px-1">
                <button onclick="window.app.shiftMonth(-1)" class="text-xs text-sky-400 font-bold scale-active">< Back</button>
                <button onclick="window.app.jumpToToday()" class="text-xs text-sky-500 font-bold underline scale-active">Today</button>
                <button onclick="window.app.shiftMonth(1)" class="text-xs text-sky-400 font-bold scale-active">Next ></button>
            </div>
            <div id="calendar-container" class="space-y-8"></div>
        </section>

        <section class="bg-white rounded-3xl p-4 shadow-sm border border-sky-50">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold text-slate-500">Events</h3>
                <button onclick="window.app.openEventModal()" class="bg-sky-400 text-white text-xs font-bold py-2 px-4 rounded-2xl shadow-md shadow-sky-100 scale-active">＋ Add</button>
            </div>
            <div id="daily-event-list" class="space-y-3"></div>
        </section>
    </main>

    <div id="modal-layer" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-overlay">
        <div id="modal-content" class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl overflow-y-auto max-h-[90vh]"></div>
    </div>

    <script>
    (function() {
        const App = {
            baseYear: 0, baseMonth: 0, selectedDateStr: '',
            oshis: JSON.parse(localStorage.getItem('oshi_list')) || [{ id: 'o1', name: '推し', color: '#7dd3fc', birthday: '' }],
            categories: JSON.parse(localStorage.getItem('cat_list')) || [{ id: 'c1', name: 'LIVE' }, { id: 'c2', name: 'チケット発売日' }, { id: 'c3', name: '当落発表' }],
            events: JSON.parse(localStorage.getItem('oshi_events')) || [],

            init: function() {
                const now = new Date();
                this.baseYear = now.getFullYear(); this.baseMonth = now.getMonth();
                this.selectedDateStr = this.safeDateStr(now);
                this.renderCalendar();
            },

            // --- ユーティリティ ---
            safeDateStr: function(d) {
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            },
            parseSafeDate: function(str) {
                if (!str) return null;
                const parts = str.split('-');
                return new Date(parts[0], parts[1] - 1, parts[2]);
            },
            save: function() {
                localStorage.setItem('oshi_list', JSON.stringify(this.oshis));
                localStorage.setItem('cat_list', JSON.stringify(this.categories));
                localStorage.setItem('oshi_events', JSON.stringify(this.events));
            },

            // --- 通知機能 ---
            requestNotif: function() {
                if (!('Notification' in window)) {
                    alert('今のブラウザでは通知機能が使えないみたいです🥹\nSafariの下にある「共有マーク」から「ホーム画面に追加」をすると使えるようになることがあります！🩵');
                    return;
                }
                if (Notification.permission === 'granted') {
                    alert('通知はすでにONになっています🙆‍♀️');
                } else {
                    Notification.requestPermission().then(p => {
                        if (p === 'granted') {
                            new Notification('Oshikatsu Calendar', { body: '通知をONにしました！' });
                        } else {
                            alert('通知が許可されませんでした🙅‍♀️');
                        }
                    });
                }
            },

            // --- カレンダー描画 ---
            renderCalendar: function() {
                const cont = document.getElementById('calendar-container'); cont.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    let y = this.baseYear, m = this.baseMonth + i;
                    if (m > 11) { m -= 12; y++; }
                    const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
                    let html = `<h2 class="text-xs font-bold text-sky-400 mb-2 px-1 tracking-widest">${y}年 ${m + 1}月</h2>
                               <div class="calendar-grid text-[8px] text-slate-300 font-bold text-center uppercase mb-2">
                               <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
                               <div class="calendar-grid gap-y-2 gap-x-1">`;
                    for (let k = 0; k < first; k++) html += `<div></div>`;
                    for (let d = 1; d <= last; d++) {
                        const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        const evs = this.getEventsForDay(ds);
                        
                        // 点（単発）と線（連続）の仕分け
                        const singleDays = evs.filter(e => !(e.endDate && e.startDate !== e.endDate));
                        const multiDays = evs.filter(e => e.endDate && e.startDate !== e.endDate);
                        
                        let indicators = '';
                        if (singleDays.length > 0) {
                            indicators += `<div class="flex gap-0.5 justify-center mb-0.5">` + 
                                singleDays.slice(0, 3).map(e => {
                                    const o = this.oshis.find(x => String(x.id) === String(e.oshiId));
                                    return `<div class="w-1.5 h-1.5 rounded-full" style="background-color:${o?.color || '#ddd'}"></div>`;
                                }).join('') + `</div>`;
                        }
                        if (multiDays.length > 0) {
                            indicators += multiDays.slice(0, 2).map(e => {
                                const o = this.oshis.find(x => String(x.id) === String(e.oshiId));
                                return `<div class="w-[90%] mx-auto h-1 rounded-sm mb-0.5" style="background-color:${o?.color || '#ddd'}; opacity:0.8"></div>`;
                            }).join('');
                        }

                        // 誕生日の判定（フィルタリングして改行表示）
                        const bdayOshis = this.oshis.filter(o => o.birthday && o.birthday.slice(5) === ds.slice(5));
                        const isSel = ds === this.selectedDateStr;
                        
                        html += `<div class="p-1 min-h-[44px] rounded-2xl flex flex-col items-center cursor-pointer transition-all ${isSel ? 'bg-sky-200 text-white shadow-md' : 'hover:bg-sky-50'}" onclick="window.app.selectDate('${ds}')">
                                 <span class="text-[11px] font-bold">${d}</span>
                                 ${bdayOshis.map(o => `<span class="text-[8px] font-bold mt-0.5 leading-[1.1] truncate w-full text-center" style="color:#334155; text-shadow: 0.8px 0.8px 0 #fff, -0.8px -0.8px 0 #fff, 0.8px -0.8px 0 #fff, -0.8px 0.8px 0 #fff, 0px 0.8px 0 #fff, 0px -0.8px 0 #fff, 0.8px 0px 0 #fff, -0.8px 0px 0 #fff, 1.2px 1.2px 0 ${o.color}, -1.2px -1.2px 0 ${o.color}, 1.2px -1.2px 0 ${o.color}, -1.2px 1.2px 0 ${o.color}, 0px 1.2px 0 ${o.color}, 0px -1.2px 0 ${o.color}, 1.2px 0px 0 ${o.color}, -1.2px 0px 0 ${o.color};">${o.name}<br>HBD!</span>`).join('')}
                                 <div class="w-full mt-auto flex flex-col justify-end pb-0.5 mt-1">
                                    ${indicators}
                                 </div>
                                 </div>`;
                    }
                    cont.innerHTML += `<div>${html}</div></div>`;
                }
                this.renderDailyEvents();
            },

            getEventsForDay: function(ds) {
                const currentD = this.parseSafeDate(ds);
                return this.events.filter(e => {
                    const start = this.parseSafeDate(e.startDate);
                    const end = this.parseSafeDate(e.endDate || e.startDate);
                    if (currentD >= start && currentD <= end) return true;
                    if (currentD >= start) {
                        if (e.repeat === 'weekly') return start.getDay() === currentD.getDay();
                        if (e.repeat === 'monthly') return start.getDate() === currentD.getDate();
                    }
                    return false;
                });
            },

            renderDailyEvents: function() {
                const list = document.getElementById('daily-event-list');
                const evs = this.getEventsForDay(this.selectedDateStr);
                const bdays = this.oshis.filter(o => o.birthday && o.birthday.slice(5) === this.selectedDateStr.slice(5));
                
                document.getElementById('selected-date-title').textContent = this.selectedDateStr.replace(/-/g, '/');
                
                let html = '';

                // 誕生日のお祝い表示
                bdays.forEach(o => {
                    html += `<div class="p-3 bg-blue-50 border border-blue-100 rounded-2xl flex items-center shadow-sm">
                        <div class="font-bold text-black-500 text-sm">🎂 ${o.name} Birthday!</div>
                    </div>`;
                });

                // 通常の予定表示
                if (evs.length > 0) {
                    html += evs.map(ev => {
                        const o = this.oshis.find(x => String(x.id) === String(ev.oshiId));
                        const c = this.categories.find(x => String(x.id) === String(ev.categoryId));
                        
                        // 特別バッジの判定
                        let badgeHtml = '';
                        const catName = c?.name || '未分類';
                        if (catName.includes('当落') || ev.name.includes('当落')) {
                            badgeHtml = `<span class="bg-rose-100 text-rose-500 px-1.5 py-0.5 rounded text-[10px]">🙏当落発表</span>`;
                        } else if (catName.includes('チケット') || ev.name.includes('チケット')) {
                            badgeHtml = `<span class="bg-blue-100 text-blue-500 px-1.5 py-0.5 rounded text-[10px]">🎫チケット発売日</span>`;
                        } else if (catName.includes('当選') || ev.name.includes('当選')) {
                            badgeHtml = `<span class="bg-yellow-100 text-yellow-600 px-1.5 py-0.5 rounded text-[10px]">🎯当選</span>`;
                        } else {
                            badgeHtml = `<span class="text-[9px] font-bold text-sky-500">${catName}</span>`;
                        }

                        return `<div class="p-3 bg-white border border-sky-100 rounded-2xl flex items-center gap-3 shadow-sm scale-active" onclick="window.app.openEventModal('${ev.id}')">
                            <div class="w-2 h-10 rounded-full" style="background-color:${o?.color || '#ddd'}"></div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start">
                                    ${badgeHtml}
                                    <span class="text-[10px] text-slate-400 font-bold">${ev.startTime || ''}${ev.endTime ? ' ~ ' + ev.endTime : ''}</span>
                                </div>
                                <div class="text-sm font-bold truncate mt-0.5">${ev.name}</div>
                                <div class="flex justify-between items-center mt-1">
                                    <span class="text-[10px] font-bold text-slate-400">${o?.name || '不明'}</span>
                                    ${ev.location ? `<a href="https://maps.google.com/?q=${encodeURIComponent(ev.location)}" target="_blank" onclick="event.stopPropagation();" class="text-[10px] text-blue-400 underline font-bold">📍Map</a>` : ''}
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                }

                if (!html) html = '<div class="text-center text-slate-300 text-xs py-8">予定はありません</div>';
                list.innerHTML = html;
            },

            // --- モーダル制御 ---
            showModal: function(html) {
                const layer = document.getElementById('modal-layer');
                document.getElementById('modal-content').innerHTML = html;
                layer.classList.remove('hidden');
            },
            closeModal: function() { document.getElementById('modal-layer').classList.add('hidden'); },

            // --- 予定の登録・編集 ---
            openEventModal: function(id = null) {
                const ev = this.events.find(e => String(e.id) === String(id)) || { name: '', startDate: this.selectedDateStr, endDate: '', startTime: '', endTime: '', oshiId: this.oshis[0]?.id, categoryId: this.categories[0]?.id, repeat: 'none', location: '' };
                this.showModal(`
                    <h3 class="font-bold mb-4 text-sky-600">${id ? '予定を編集' : '予定を登録'}</h3>
                    <form id="ev-form" class="space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="text-[9px] font-bold text-slate-400 ml-1">開始日</label><input type="date" id="ev-start" value="${ev.startDate}" required class="w-full bg-slate-50 p-2 rounded-xl text-xs outline-none border border-sky-50"></div>
                            <div><label class="text-[9px] font-bold text-slate-400 ml-1">終了日(任意)</label><input type="date" id="ev-end" value="${ev.endDate || ''}" class="w-full bg-slate-50 p-2 rounded-xl text-xs outline-none border border-sky-50"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="text-[9px] font-bold text-slate-400 ml-1">開始時間</label><input type="time" id="ev-stime" value="${ev.startTime}" class="w-full bg-slate-50 p-2 rounded-xl text-xs outline-none border border-sky-50"></div>
                            <div><label class="text-[9px] font-bold text-slate-400 ml-1">終了時間</label><input type="time" id="ev-etime" value="${ev.endTime}" class="w-full bg-slate-50 p-2 rounded-xl text-xs outline-none border border-sky-50"></div>
                        </div>
                        <input type="text" id="ev-name" value="${ev.name}" placeholder="タイトル" required class="w-full bg-slate-50 p-3 rounded-xl text-sm outline-none border border-sky-50">
                        <input type="text" id="ev-loc" value="${ev.location}" placeholder="場所・住所 (Map連動)" class="w-full bg-slate-50 p-3 rounded-xl text-sm outline-none border border-sky-50">
                        <div class="grid grid-cols-2 gap-2">
                            <select id="ev-oshi" class="bg-slate-50 p-3 rounded-xl text-xs border border-sky-50">${this.oshis.map(o => `<option value="${o.id}" ${String(o.id) === String(ev.oshiId) ? 'selected' : ''}>${o.name}</option>`).join('')}</select>
                            <select id="ev-cat" class="bg-slate-50 p-3 rounded-xl text-xs border border-sky-50">${this.categories.map(c => `<option value="${c.id}" ${String(c.id) === String(ev.categoryId) ? 'selected' : ''}>${c.name}</option>`).join('')}</select>
                        </div>
                        <select id="ev-repeat" class="w-full bg-slate-50 p-3 rounded-xl text-xs border border-sky-50">
                            <option value="none" ${ev.repeat === 'none' ? 'selected' : ''}>繰り返しなし</option>
                            <option value="weekly" ${ev.repeat === 'weekly' ? 'selected' : ''}>毎週</option>
                            <option value="monthly" ${ev.repeat === 'monthly' ? 'selected' : ''}>毎月</option>
                        </select>
                        <div class="flex gap-2 pt-2">
                            <button type="button" onclick="window.app.closeModal()" class="flex-1 bg-slate-100 py-3 rounded-2xl text-xs font-bold">戻る</button>
                            ${id ? `<button type="button" onclick="window.app.deleteEvent('${id}')" class="flex-1 bg-rose-50 text-rose-400 py-3 rounded-2xl text-xs font-bold">削除</button>` : ''}
                            <button type="submit" class="flex-1 bg-sky-400 text-white py-3 rounded-2xl text-xs font-bold shadow-md">保存</button>
                        </div>
                    </form>
                `);
                document.getElementById('ev-form').onsubmit = (e) => {
                    e.preventDefault();
                    const newEv = {
                        id: id || 'ev' + Date.now(),
                        startDate: document.getElementById('ev-start').value,
                        endDate: document.getElementById('ev-end').value,
                        startTime: document.getElementById('ev-stime').value,
                        endTime: document.getElementById('ev-etime').value,
                        name: document.getElementById('ev-name').value,
                        location: document.getElementById('ev-loc').value,
                        oshiId: document.getElementById('ev-oshi').value,
                        categoryId: document.getElementById('ev-cat').value,
                        repeat: document.getElementById('ev-repeat').value
                    };
                    if (id) this.events = this.events.map(x => String(x.id) === String(id) ? newEv : x);
                    else this.events.push(newEv);
                    this.save(); this.closeModal(); this.renderCalendar();
                };
            },
            deleteEvent: function(id) { if (confirm('予定を削除しますか？')) { this.events = this.events.filter(x => String(x.id) !== String(id)); this.save(); this.closeModal(); this.renderCalendar(); } },

            // --- 推しの登録・編集 ---
            openOshiModal: function() {
                this.showModal(`
                    <h3 class="font-bold mb-4 text-sky-600">推し設定</h3>
                    <form id="oshi-form" class="space-y-3 mb-4">
                        <input type="text" id="o-name" placeholder="推しの名前" required class="w-full bg-slate-50 p-3 rounded-xl text-sm border border-sky-50 outline-none">
                        <div class="flex items-center gap-3 bg-slate-50 p-2 rounded-xl border border-sky-50">
                            <span class="text-[10px] font-bold text-slate-400 ml-1">カラー</span>
                            <input type="color" id="o-color" value="#7dd3fc" class="flex-1 h-8 bg-transparent cursor-pointer">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-slate-400 ml-1">誕生日 (任意)</label>
                            <input type="date" id="o-bday" class="w-full bg-slate-50 p-3 rounded-xl text-sm border border-sky-50 outline-none">
                        </div>
                        <button type="submit" class="w-full bg-sky-400 text-white font-bold py-3 rounded-2xl text-xs shadow-md">追加</button>
                    </form>
                    <div class="space-y-2 max-h-40 overflow-y-auto">${this.oshis.map(o => `
                        <div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl border border-sky-50">
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full" style="background-color:${o.color}"></div><span class="text-xs font-bold">${o.name}</span></div>
                            <button onclick="window.app.deleteOshi('${o.id}')" class="text-slate-300 text-xs px-2 font-bold">✕</button>
                        </div>`).join('')}</div>
                    <button onclick="window.app.closeModal()" class="w-full bg-slate-100 py-3 rounded-2xl text-xs font-bold mt-4">閉じる</button>
                `);
                document.getElementById('oshi-form').onsubmit = (e) => {
                    e.preventDefault();
                    this.oshis.push({ id: 'o' + Date.now(), name: document.getElementById('o-name').value, color: document.getElementById('o-color').value, birthday: document.getElementById('o-bday').value });
                    this.save(); this.openOshiModal(); this.renderCalendar();
                };
            },
            deleteOshi: function(id) { if (confirm('この推しを解除しますか？')) { this.oshis = this.oshis.filter(x => String(x.id) !== String(id)); this.save(); this.openOshiModal(); this.renderCalendar(); } },

            // --- 項目の登録・編集 ---
            openConfigModal: function() {
                this.showModal(`
                    <h3 class="font-bold mb-4 text-sky-600">項目設定</h3>
                    <form id="cat-form" class="space-y-3 mb-4">
                        <input type="text" id="c-name" placeholder="項目名 (例: ラジオ, 当選 etc)" required class="w-full bg-slate-50 p-3 rounded-xl text-sm border border-sky-50 outline-none">
                        <button type="submit" class="w-full bg-sky-400 text-white font-bold py-3 rounded-2xl text-xs shadow-md">追加</button>
                    </form>
                    <div class="space-y-2 max-h-40 overflow-y-auto">${this.categories.map(c => `
                        <div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl border border-sky-50">
                            <span class="text-xs font-bold">${c.name}</span>
                            <button onclick="window.app.deleteCat('${c.id}')" class="text-slate-300 text-xs px-2 font-bold">✕</button>
                        </div>`).join('')}</div>
                    <button onclick="window.app.closeModal()" class="w-full bg-slate-100 py-3 rounded-2xl text-xs font-bold mt-4">閉じる</button>
                `);
                document.getElementById('cat-form').onsubmit = (e) => {
                    e.preventDefault();
                    this.categories.push({ id: 'c' + Date.now(), name: document.getElementById('c-name').value });
                    this.save(); this.openConfigModal(); this.renderCalendar();
                };
            },
            deleteCat: function(id) { if (confirm('この項目を消去しますか？')) { this.categories = this.categories.filter(x => String(x.id) !== String(id)); this.save(); this.openConfigModal(); this.renderCalendar(); } },

            // --- 設定 & バックアップ ---
            openSettingModal: function() {
                this.showModal(`
                    <h3 class="font-bold mb-4 text-sky-600">アプリ設定</h3>
                    <p class="text-[10px] text-slate-400 mb-2">データの書き出し (機種変更など)</p>
                    <textarea id="back-data" class="w-full h-20 bg-slate-50 p-2 rounded-xl text-[8px] border border-sky-50 outline-none">${JSON.stringify({oshis:this.oshis, events:this.events, cats:this.categories})}</textarea>
                    <button onclick="window.app.copyBackup()" class="w-full bg-sky-400 text-white py-2 rounded-xl text-xs font-bold mt-1 shadow-sm">データをコピーする</button>
                    <hr class="my-4 border-sky-50">
                    <p class="text-[10px] text-slate-400 mb-2">データの読み込み (復元)</p>
                    <textarea id="import-data" placeholder="ここにデータを貼り付け" class="w-full h-20 bg-slate-50 p-2 rounded-xl text-[8px] border border-sky-50 outline-none"></textarea>
                    <button onclick="window.app.importBackup()" class="w-full bg-slate-700 text-white py-2 rounded-xl text-xs font-bold mt-1 shadow-sm">データを読み込む</button>
                    <button onclick="window.app.closeModal()" class="w-full bg-slate-100 py-3 rounded-2xl text-xs font-bold mt-4">閉じる</button>
                `);
            },
            copyBackup: function() { document.getElementById('back-data').select(); document.execCommand('copy'); alert('コピーしました！メモ帳などに貼り付けて保存してください。'); },
            importBackup: function() {
                try {
                    const data = JSON.parse(document.getElementById('import-data').value);
                    if (data.oshis) this.oshis = data.oshis;
                    if (data.events) this.events = data.events;
                    if (data.cats) this.categories = data.cats;
                    this.save(); location.reload();
                } catch(e) { alert('データ形式が正しくありません'); }
            },

            // --- 画面操作 ---
            selectDate: function(ds) { this.selectedDateStr = ds; this.renderCalendar(); },
            shiftMonth: function(dir) { this.baseMonth += dir; if (this.baseMonth < 0) { this.baseMonth = 11; this.baseYear--; } else if (this.baseMonth > 11) { this.baseMonth = 0; this.baseYear++; } this.renderCalendar(); },
            jumpToToday: function() { const now = new Date(); this.baseYear = now.getFullYear(); this.baseMonth = now.getMonth(); this.selectedDateStr = this.safeDateStr(now); this.renderCalendar(); }
        };

        window.app = App;
        window.onload = () => App.init();
    })();
    </script>
</body>
</html>
