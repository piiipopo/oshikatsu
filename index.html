<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oshikatsu Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-sky-50 text-slate-700 pb-20">

    <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-30 p-4 border-b border-sky-100 flex justify-between items-center">
        <h1 class="text-lg font-bold text-sky-600">Oshikatsu Calendar</h1>
        <div class="flex gap-2">
            <button onclick="window.app.openConfigModal()" class="bg-slate-100 text-slate-600 text-xs font-bold py-2 px-3 rounded-2xl">項目</button>
            <button onclick="window.app.openOshiModal()" class="bg-sky-100 text-sky-600 text-xs font-bold py-2 px-3 rounded-2xl">推し</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <section class="bg-white rounded-3xl p-4 shadow-sm">
            <div id="calendar-container" class="space-y-6"></div>
        </section>

        <section class="bg-white rounded-3xl p-4 shadow-sm">
            <div class="flex justify-between items-center mb-3">
                <h3 id="selected-date-title" class="text-sm font-bold">Events</h3>
                <button onclick="window.app.openEventModal()" class="bg-sky-400 text-white text-xs font-bold py-2 px-4 rounded-2xl">＋ Add</button>
            </div>
            <div id="daily-event-list" class="space-y-3"></div>
        </section>
    </main>

    <div id="event-modal" class="fixed inset-0 bg-black/20 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl max-h-[80vh] overflow-y-auto">
            <h3 class="font-bold mb-4">予定を登録</h3>
            <form id="event-form" class="space-y-3">
                <input type="hidden" id="event-id">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="event-start-date" required class="bg-slate-50 p-2 rounded-xl text-xs w-full">
                    <input type="date" id="event-end-date" class="bg-slate-50 p-2 rounded-xl text-xs w-full">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="time" id="event-start-time" class="bg-slate-50 p-2 rounded-xl text-xs w-full">
                    <select id="event-repeat" class="bg-slate-50 p-2 rounded-xl text-xs w-full">
                        <option value="none">繰り返しなし</option>
                        <option value="weekly">毎週</option>
                        <option value="monthly">毎月</option>
                    </select>
                </div>
                <input type="text" id="event-name" placeholder="タイトル" required class="w-full bg-slate-50 p-3 rounded-xl text-sm">
                <input type="text" id="event-location" placeholder="場所（Googleマップで検索されます）" class="w-full bg-slate-50 p-3 rounded-xl text-sm">
                <select id="event-oshi" class="w-full bg-slate-50 p-3 rounded-xl text-sm"></select>
                <select id="event-category" class="w-full bg-slate-50 p-3 rounded-xl text-sm"></select>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="window.app.closeModal('event-modal')" class="flex-1 bg-slate-100 py-2 rounded-xl text-sm font-bold">戻る</button>
                    <button type="submit" class="flex-1 bg-sky-400 text-white py-2 rounded-xl text-sm font-bold">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function() {
            const App = {
                events: JSON.parse(localStorage.getItem('oshi_events')) || [],
                oshis: JSON.parse(localStorage.getItem('oshi_list')) || [{id:'o1', name:'推し', color:'#7dd3fc'}],
                categories: JSON.parse(localStorage.getItem('cat_list')) || [{id:'c1', name:'LIVE'}, {id:'c2', name:'TV/雑誌'}],
                
                init: function() {
                    this.renderCalendar();
                },
                renderCalendar: function() {
                    const cont = document.getElementById('calendar-container');
                    cont.innerHTML = '';
                    const now = new Date();
                    for(let i=0; i<3; i++){
                        let y = now.getFullYear(), m = now.getMonth()+i;
                        if(m>11){m-=12; y++}
                        let html = `<h2 class="text-xs font-bold text-sky-400">${y}年${m+1}月</h2><div class="grid grid-cols-7 gap-1 mt-2 text-[10px] text-center">`;
                        for(let d=1; d<=new Date(y,m+1,0).getDate(); d++){
                            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                            html += `<div class="p-1 rounded-xl cursor-pointer hover:bg-sky-100" onclick="window.app.selectDate('${ds}')">${d}</div>`;
                        }
                        cont.innerHTML += `<div>${html}</div></div>`;
                    }
                },
                selectDate: function(ds) { 
                    this.selectedDate = ds; 
                    document.getElementById('selected-date-title').innerText = ds;
                    const list = document.getElementById('daily-event-list');
                    list.innerHTML = this.events.filter(e => e.startDate === ds).map(ev => `
                        <div class="p-3 bg-white border border-sky-100 rounded-2xl shadow-sm">
                            <div class="text-[10px] text-sky-500 font-bold">${ev.categoryName || ''}</div>
                            <div class="font-bold">${ev.name}</div>
                            ${ev.location ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.location)}" target="_blank" class="text-[10px] text-blue-500 underline">📍 ${ev.location}</a>` : ''}
                        </div>
                    `).join('') || '予定なし';
                },
                openEventModal: function() { 
                    document.getElementById('event-oshi').innerHTML = this.oshis.map(o=>`<option value="${o.id}">${o.name}</option>`).join('');
                    document.getElementById('event-category').innerHTML = this.categories.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
                    document.getElementById('event-modal').classList.remove('hidden'); 
                },
                closeModal: function(id) { document.getElementById(id).classList.add('hidden'); },
                openOshiModal: function() { alert("推し編集画面（今回はここから実装します！）"); },
                openConfigModal: function() { alert("項目編集画面"); }
            };
            window.app = App; App.init();
        })();
    </script>
</body>
</html>
